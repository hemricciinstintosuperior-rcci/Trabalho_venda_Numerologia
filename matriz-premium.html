<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Premium • Pirâmide Quântica</title>
<style>
   html, body {
    background: white;
} 
    body{font-family:"Times New Roman",serif;background:white;margin:0; color:#1a1a1a;}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
    .capa{background:white;text-align:center;padding:100px 40px; page-break-after: always;}
    .logo{width:200%; max-width:900px; margin-bottom:40px;}
    .logo {
    background: #transparent;
    padding: 10px;
}
    .nomeCliente{margin-top:50px;font-size:28px; border-top: 1px solid #ccc; padding-top: 20px; display: inline-block;}
    
    /* ESTILO DO SUMÁRIO DETALHADO CORRIGIDO */
    .sumario-detalhado {
        max-width: 800px; margin: 20px auto; background: white; padding: 40px;
        border-radius: 10px; border: 1px solid #fff; page-break-after: always;
    }
    .sumario-detalhado h2 { text-align: center; text-transform: uppercase; border-bottom: 3px solid #facc15; margin-bottom: 30px; }
    .secao-indice { margin-bottom: 20px; }
    .titulo-secao-indice { font-weight: bold; font-size: 18px; text-transform: uppercase; color: #4338ca; border-bottom: 1px solid #eee; display: block; margin-bottom: 5px; }
    .item-sub-indice { font-size: 16px; margin-center: 20px; color: #333; line-height: 1.8; border-bottom: 1px dotted #eee; }

    .secao{ max-width:800px;margin:20px auto;background:white; padding:20px;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,.05); page-break-inside: avoid; }
    .texto{white-space:pre-line;font-size:16px;line-height:1.3; text-align: justify;}
    .piramide{display:flex;flex-direction:column;align-items:center;margin:20px 0; font-family: monospace;}

    .linha{display:flex;justify-content:center;margin:1px 0; gap: 4px;}
    .num{ width:15px;height:15px;border-radius:4px; display:flex;align-items:center;justify-content:center; font-weight:bold;font-size:16px; color:#000; background:#02B0F2; }
    .num.negativo{background:#FF0000 !important; color:#fff !important;}
    .num.especial{background:#b8860b !important; color:#fff !important;}
    .num.financeiro{background:#34c759 !important; color:#fff !important;}
    .box { border: 1px solid #fff; padding: 20px; margin: 10px 0; border-radius: 8px; background: #transparent; text-align: center; }
    .box p { white-space: pre-wrap; display: block; margin-bottom: 15px; line-height: 1.4; text-align: justify; background: transparent;}
    .rodape{text-align:center;margin-top:50px;font-size:20px;color:#999; border-top: 1px solid #fff; padding-top: 20px;}
    .btn-container { text-align:center; margin: 30px 0; }
    button{ background: #facc15; border: none; padding: 15px 30px; font-weight: bold; font-size: 18px; border-radius: 8px; cursor: pointer; }
/* Títulos centralizados */
h1, h2, h3 {
    text-align: center !important;
    width: 100%;
    margin-top: 25px;
    margin-bottom: 15px;
}
/* Estilo para a mini-logo em todas as páginas */
.mini-logo-fixa {
    position: fixed;
    top: 0px; /* Distância do fim da folha */
    right: 0px;  /* Distância do canto direito */
    width: 60px;  /* Tamanho bem pequeno, tipo um emoji */
    height: auto;
    z-index: 9999;
    pointer-events: none; /* Garante que não atrapalhe cliques */
    opacity: 1.9; /* Um pouco de transparência para ficar elegante */
}

/* Garante que o conteúdo não cubra a logo na impressão */
@media print {
    .mini-logo-fixa {
        display: block !important;
        -webkit-print-color-adjust: exact;
    }
}
/* Textos e parágrafos alinhados à esquerda */
.texto, .box p, .blocoRelatorio p, .blocoRelatorio div {
    text-align: left !important; /* Força o alinhamento à esquerda */
    white-space: pre-wrap;      /* Mantém os parágrafos do textos.js */
    line-height: 1.6;
    margin-bottom: 15px;
    display: block;
}

/* Garante que a pirâmide continue centralizada mesmo com textos à esquerda */
.piramide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 20px auto;
    width: 100%;
}
    @media print {
        body { background:transparent !important; }
        .btn-container { display: none !important; }
    }

/* Adicione isso ao final do seu bloco <style> */
div.texto, .blocoRelatorio div, .box p {
    white-space: pre-line !important;
    margin-bottom: 20px !important;
    display: block !important;
}
    
</style>
</head>
<body>
<div id="conteudo">Gerando seu relatório quântico premium...</div>

<script>
const dados = localStorage.getItem("relatorioPiramide");
if(!dados){ 
    document.body.innerHTML="<div class='secao'>ERRO: Dados não encontrados. Gere as matrizes primeiro.</div>"; 
} else {
    const rel = JSON.parse(dados);
    document.getElementById("conteudo").innerHTML = `
    <div class="btn-container">
        <button onclick="window.print()">📄 Baixar Relatório em PDF</button>
    </div>

    <div class="capa">
        <img class="logo" src="https://hemricciinstintosuperior-rcci.github.io/Trabalho_venda_Numerologia/matriz.png"<img src="logo.png" style="background:#ffffff; padding:10px;">
                   <img src="https://hemricciinstintosuperior-rcci.github.io/Trabalho_venda_Numerologia/ícone-512.jpg" class="mini-logo-fixa">
        <div class="nomeCliente">Relatório Personalizado para:<br><strong>${rel.nome}</strong><br>Nascimento: ${rel.data}</div>
    </div>

    <div class="sumario-detalhado">
        <h2>Sumário Completo</h2>
        <div class="secao-indice">
            <span class="titulo-secao-indice">01. Fundamentos</span>
            <div class="item-sub-indice">Introdução ao Método Quântico</div>
            <div class="item-sub-indice">Síntese de Dinâmica do Relatório</div>
        </div>
        <div class="secao-indice">
            <span class="titulo-secao-indice">02. Matriz da Vida (Plano Concreto)</span>
            <div class="item-sub-indice"> Regente da Vida o Principal</div>
            <div class="item-sub-indice">Vulnerabilidades e Sequências Negativas da Vida</div>
            <div class="item-sub-indice">Sequências Especiais e Impactos da Vida</div>
            <div class="item-sub-indice">Fluxo Financeiro e Prosperidade da Vida</div>
            <div class="item-sub-indice">Cronograma de Vigências (Relógio Mestre) da Vida</div>
        </div>
        <div class="secao-indice">
            <span class="titulo-secao-indice">03. Matriz Pessoal (Plano Interno)</span>
            <div class="item-sub-indice"> Regente Sentimentos e Filtros Emocionais</div>
            <div class="item-sub-indice">Vulnerabilidades e Sequências Negativas Internas</div>
            <div class="item-sub-indice">Sequências Especiais e Impactos Internos</div>
            <div class="item-sub-indice">Fluxo Financeiro e Prosperidade no Nível do Pensamento</div>
            <div class="item-sub-indice">Cronograma de Vigências (Relógio Mestre) do Intelecto</div>
        </div>
        <div class="secao-indice">
            <span class="titulo-secao-indice">04. Matriz Social (Plano Coletivo)</span>
            <div class="item-sub-indice"> Regente Interação com o Meio e Sociedade</div>
            <div class="item-sub-indice">Vulnerabilidades e Sequências Negativas do seu Meio</div>
            <div class="item-sub-indice">Sequências Especiais e Impactos do seu Meio</div>
            <div class="item-sub-indice">Fluxo Financeiro e Prosperidade do seu Meio</div>

        </div>
        <div class="secao-indice">
            <span class="titulo-secao-indice">05. Matriz de Destino (Influência e Propósito)</span>
            <div class="item-sub-indice"> Regente Direcionamento e Intervenção do Universo</div>
            <div class="item-sub-indice">Vulnerabilidades (Sequências Negativas) do Destino</div>
            <div class="item-sub-indice">Sequências Especiais e Impactos do Destino</div>
            <div class="item-sub-indice">Fluxo Financeiro e Prosperidade do Destino</div>

        </div>
        <div class="secao-indice">

        </div>
    </div>
    
    <div class="secao">
        <h1 style="text-align: center;">💎Introdução ao Método💎</h1>
        <div class="texto">A Pirâmide Quântica representa um dos métodos mais sofisticados de autoconhecimento da atualidade, unindo a sabedoria ancestral da numerologia à compreensão moderna das frequências vibracionais. Neste sistema, os números não são tratados apenas como ferramentas matemáticas, mas como códigos vivos que expressam estruturas energéticas ativas, responsáveis por organizar percepções, experiências e direcionamentos existenciais.

No centro do método está a Pirâmide da Vida, a base principal. Ela rege a experiência concreta do indivíduo e revela o que efetivamente está acontecendo em sua trajetória. É a estrutura objetiva da existência — o campo dos acontecimentos reais. Todas as demais pirâmides dialogam com ela.

A Pirâmide Pessoal representa a percepção interna: sentimentos, interpretações subjetivas e filtros emocionais e intelectuais. A Pirâmide Social revela a leitura que o indivíduo faz do seu meio de convivência e as influências oriundas das relações e do ambiente coletivo. Já a Pirâmide do Destino, também chamada de Influência e Propósito, expressa as forças direcionais que atuam como impulso evolutivo e conduzem a experiência.

Quando a potência numérica da Pirâmide da Vida coincide com a potência da Pirâmide Pessoal, existe alinhamento entre realidade e percepção interna. O indivíduo enxerga com clareza o que está acontecendo em sua vida, pois sentimento e fato vibram na mesma frequência. Há coerência entre o que se vive e o que se compreende internamente.

Se a potência da Pirâmide da Vida coincide com a Pirâmide Social, isso indica que o meio exerce influência direta sobre os acontecimentos concretos da vida. O que ocorre na sociedade ao redor reflete-se objetivamente na trajetória pessoal. A experiência externa e o contexto coletivo caminham sincronizados.

Quando a Pirâmide da Vida possui a mesma potência da Pirâmide do Destino, significa que a influência universal ou o propósito está diretamente alinhado aos acontecimentos reais. O indivíduo percebe que existe uma condução maior atuando em sua jornada, e os fatos confirmam essa direção.

Entretanto, quando as potências são diferentes, surgem desalinhamentos perceptivos. Se a Pirâmide Pessoal diverge da Pirâmide da Vida, pode haver discrepância entre o que se sente e o que de fato ocorre. O indivíduo pode interpretar a realidade a partir de filtros internos que não correspondem integralmente aos acontecimentos objetivos. Existe a probabilidade de enxergar apenas pelo campo emocional ou intelectual.

Quando a Pirâmide Pessoal coincide com a Pirâmide Social, há identificação direta com o meio. O indivíduo e seu ambiente atravessam vibrações semelhantes, e as situações vividas coletivamente ressoam internamente com intensidade ampliada.

Se a Pirâmide Pessoal coincide com a Pirâmide do Destino, o sentimento interno pode estar sendo diretamente influenciado por forças de propósito ou por movimentos maiores que conduzem sua jornada. A pessoa sente essa influência, ainda que nem sempre perceba que os fatos concretos acompanham essa vibração.

Quando a Pirâmide Social e a Pirâmide do Destino possuem a mesma potência numérica, o ambiente coletivo torna-se palco de manifestações do propósito. O indivíduo percebe influências maiores atuando em seu meio de convivência. Mesmo que a Pirâmide da Vida tenha outra vibração, ainda assim sentirá a interferência do destino.

Quando as quatro pirâmides apresentam potências distintas, há múltiplas camadas de percepção. A pessoa pode sentir algo internamente, perceber outra coisa no meio social e viver fatos que não correspondem exatamente às suas interpretações. Nesse cenário, o método não aponta erro, mas complexidade vibracional — um campo onde consciência e alinhamento tornam-se fundamentais.

A Pirâmide Quântica não apenas identifica números, mas revela relações entre realidades, percepções e influências. Ela mostra onde há alinhamento, onde há interferência e onde existe potencial de integração.

Este relatório não é uma análise superficial. É a leitura estrutural da arquitetura energética que sustenta sua jornada. Ao compreender como essas quatro pirâmides interagem, você passa a distinguir fato de percepção, influência de interpretação e destino de condicionamento.

A proposta final do método é ampliar consciência. Quando há clareza sobre essas interações, a vida deixa de ser apenas vivida e passa a ser compreendida em sua dinâmica vibracional profunda.</div>
    </div>

    ${rel.abaPrincipal ? `<div class="secao"style="text-align: center;">${rel.abaPrincipal}</div>` : ''}
    ${rel.abaPessoal ? `<div class="secao"style="text-align: center;">${rel.abaPessoal}</div>` : ''}
    ${rel.abaSocial ? `<div class="secao"style="text-align: center;">${rel.abaSocial}</div>` : ''}

    <div class="secao" style="text-align: center;">
        <h1>Considerações Finais</h1>
