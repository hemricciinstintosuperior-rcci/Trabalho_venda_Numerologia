<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Premium • Pirâmide Quântica</title>
<style>
body{font-family:"Times New Roman",serif;background:#f4f4f4;margin:0; color:#1a1a1a;}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.capa{background:white;text-align:center;padding:120px 40px; page-break-after: always;}
.logo{width:550px;margin-bottom:40px;}
.nomeCliente{margin-top:70px;font-size:28px; border-top: 1px solid #ccc; padding-top: 20px; display: inline-block;}
.secao{ max-width:900px;margin:30px auto;background:white; padding:50px;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,.05); page-break-inside: avoid; }
.texto{white-space:pre-line;font-size:18px;line-height:1.6; text-align: justify;}
.tituloPiramide{text-align:center;font-size:28px;margin-bottom:30px; font-weight: bold; color: #111; text-transform: uppercase;}
.piramide{display:flex;flex-direction:column;align-items:center;margin:30px 0; font-family: monospace;}
.linha{display:flex;justify-content:center;margin:1px 0; gap: 4px;}
.num{ width:24px;height:24px;border-radius:4px; display:flex;align-items:center;justify-content:center; font-weight:bold;font-size:14px; color:#000; background:#28d3ee; }
.num.negativo{background:#FF0000 !important; color:#fff !important;}
.num.especial{background:#f6c445 !important; color:#000 !important;}
.num.financeiro{background:#34c759 !important; color:#fff !important;}
.box { border: 1px solid #ddd; padding: 20px; margin: 15px 0; border-radius: 8px; background: #fafafa; }
div[style*="border-left:4px solid #ff6b6b"] { background: #fff5f5 !important; padding: 10px; margin-bottom: 5px; }
div[style*="border-left:4px solid #f6c445"] { background: #fffdf5 !important; padding: 10px; margin-bottom: 5px; }
div[style*="border-left:4px solid #34c759"] { background: #f5fff5 !important; padding: 10px; margin-bottom: 5px; }
.rodape{text-align:center;margin-top:50px;font-size:12px;color:#999; border-top: 1px solid #eee; padding-top: 20px;}
.btn-container { text-align:center; margin: 40px 0; }
button{ background: #facc15; border: none; padding: 15px 30px; font-weight: bold; font-size: 18px; border-radius: 8px; cursor: pointer; }
@media print{ .no-print{display:none!important;} body { background: white; } .secao { box-shadow: none; margin: 0 auto; width: 100%; padding: 30px; } }

/* AJUSTE MOBILE PARA O PREMIUM */
@media screen and (max-width: 600px) {
    .secao { padding: 20px 15px; margin: 10px; }
    .capa { padding: 60px 20px; }
    .logo { width: 100%; height: auto; }
    .tituloPiramide { font-size: 22px; }
    .nomeCliente { font-size: 20px; width: 100%; }
    
    /* Faz a pirâmide caber na tela do celular sem cortar */
    .num { 
        width: 18px; 
        height: 18px; 
        font-size: 10px; 
        border-radius: 2px;
    }
    .linha { gap: 2px; }
}

</style>
</head>
<body>
<div id="conteudo">Gerando seu relatório quântico premium...</div>
<script>
const dados = localStorage.getItem("relatorioPiramide");
if(!dados){ document.body.innerHTML="<div class='secao'>ERRO: Nenhum dado encontrado.</div>"; throw new Error(); }
const relatorio = JSON.parse(dados);

// ... (mantenha a leitura do localStorage e a parte da capa)

// ... (mantenha a leitura do localStorage e a parte da capa)

document.getElementById("conteudo").innerHTML = `
<div class="capa">
    <img class="logo" src="https://hemricciinstintosuperior-rcci.github.io/Matriz_quantica_da_vida/matriz.png">
    <div class="nomeCliente">Relatório Personalizado para:<br><strong>${relatorio.nome}</strong><br>Nascimento: ${relatorio.data}</div>
</div>

<div class="secao">
    <h2>Introdução ao Método</h2>
    <div class="texto">${/* Seu texto longo de introdução aqui */}</div>
</div>

${relatorio.abaPrincipal ? `<div class="secao">${relatorio.abaPrincipal}</div>` : ''}
${relatorio.abaPessoal ? `<div class="secao">${relatorio.abaPessoal}</div>` : ''}
${relatorio.abaSocial ? `<div class="secao">${relatorio.abaSocial}</div>` : ''}
${relatorio.abaDestino ? `<div class="secao">${relatorio.abaDestino}</div>` : ''}

<div class="secao">
    <h2>Considerações Finais</h2>
    <div class="texto">Este relatório foi desenvolvido para apoiar o seu processo de autoconhecimento.</div>
    <div class="rodape">Relatório Confidencial • Instinto Superior • 2026</div>
</div>

<div class="btn-container no-print">
    <button onclick="window.print()">📄 Baixar Relatório em PDF</button>
</div>
`;
</script>
</body>
</html>
