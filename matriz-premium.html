const textos = {
  
introducaoMetodo: `
A Pirâmide Quântica representa um dos métodos mais sofisticados de autoconhecimento da atualidade, unindo a sabedoria ancestral da numerologia à compreensão moderna das frequências vibracionais. Neste sistema, os números não são tratados apenas como ferramentas matemáticas, mas como códigos vivos que expressam estruturas energéticas ativas, responsáveis por organizar percepções, experiências e direcionamentos existenciais.

No centro do método está a Pirâmide da Vida, a base principal. Ela rege a experiência concreta do indivíduo e revela o que efetivamente está acontecendo em sua trajetória. É a estrutura objetiva da existência — o campo dos acontecimentos reais. Todas as demais pirâmides dialogam com ela.

A Pirâmide Pessoal representa a percepção interna: sentimentos, interpretações subjetivas e filtros emocionais e intelectuais. A Pirâmide Social revela a leitura que o indivíduo faz do seu meio de convivência e as influências oriundas das relações e do ambiente coletivo. Já a Pirâmide do Destino, também chamada de Influência e Propósito, expressa as forças direcionais que atuam como impulso evolutivo e conduzem a experiência.

Quando a potência numérica da Pirâmide da Vida coincide com a potência da Pirâmide Pessoal, existe alinhamento entre realidade e percepção interna. O indivíduo enxerga com clareza o que está acontecendo em sua vida, pois sentimento e fato vibram na mesma frequência. Há coerência entre o que se vive e o que se compreende internamente.

Se a potência da Pirâmide da Vida coincide com a Pirâmide Social, isso indica que o meio exerce influência direta sobre os acontecimentos concretos da vida. O que ocorre na sociedade ao redor reflete-se objetivamente na trajetória pessoal. A experiência externa e o contexto coletivo caminham sincronizados.

Quando a Pirâmide da Vida possui a mesma potência da Pirâmide do Destino, significa que a influência universal ou o propósito está diretamente alinhado aos acontecimentos reais. O indivíduo percebe que existe uma condução maior atuando em sua jornada, e os fatos confirmam essa direção.

Entretanto, quando as potências são diferentes, surgem desalinhamentos perceptivos. Se a Pirâmide Pessoal diverge da Pirâmide da Vida, pode haver discrepância entre o que se sente e o que de fato ocorre. O indivíduo pode interpretar a realidade a partir de filtros internos que não correspondem integralmente aos acontecimentos objetivos. Existe a probabilidade de enxergar apenas pelo campo emocional ou intelectual.

Quando a Pirâmide Pessoal coincide com a Pirâmide Social, há identificação direta com o meio. O indivíduo e seu ambiente atravessam vibrações semelhantes, e as situações vividas coletivamente ressoam internamente com intensidade ampliada.

Se a Pirâmide Pessoal coincide com a Pirâmide do Destino, o sentimento interno pode estar sendo diretamente influenciado por forças de propósito ou por movimentos maiores que conduzem sua jornada. A pessoa sente essa influência, ainda que nem sempre perceba que os fatos concretos acompanham essa vibração.

Quando a Pirâmide Social e a Pirâmide do Destino possuem a mesma potência numérica, o ambiente coletivo torna-se palco de manifestações do propósito. O indivíduo percebe influências maiores atuando em seu meio de convivência. Mesmo que a Pirâmide da Vida tenha outra vibração, ainda assim sentirá a interferência do destino.

Quando as quatro pirâmides apresentam potências distintas, há múltiplas camadas de percepção. A pessoa pode sentir algo internamente, perceber outra coisa no meio social e viver fatos que não correspondem exatamente às suas interpretações. Nesse cenário, o método não aponta erro, mas complexidade vibracional — um campo onde consciência e alinhamento tornam-se fundamentais.

A Pirâmide Quântica não apenas identifica números, mas revela relações entre realidades, percepções e influências. Ela mostra onde há alinhamento, onde há interferência e onde existe potencial de integração.

Este relatório não é uma análise superficial. É a leitura estrutural da arquitetura energética que sustenta sua jornada. Ao compreender como essas quatro pirâmides interagem, você passa a distinguir fato de percepção, influência de interpretação e destino de condicionamento.

A proposta final do método é ampliar consciência. Quando há clareza sobre essas interações, a vida deixa de ser apenas vivida e passa a ser compreendida em sua dinâmica vibracional profunda.
`,

  introRegente: `
O Regente é o coração da sua pirâmide; ele representa a força central que governa toda a sua estrutura energética durante toda a existência. Imagine o Regente como o "Sol" do seu mapa numerológico: tudo gira em torno dele. Ele define a sua identidade básica, o seu temperamento e a maneira como você se posiciona diante do mundo.

Esta é a frequência que permanece constante, independentemente das mudanças externas ou dos ciclos temporários que você atravessa. Conhecer o seu Regente é fundamental para entender por que você reage de certas formas a determinados estímulos, funcionando como o filtro principal da sua percepção da vida.

Quando você está em harmonia com essa energia, a vida flui com uma naturalidade impressionante e os obstáculos parecem menores. Por outro lado, agir contra a natureza do seu Regente gera um desgaste energético imenso, resultando em cansaço e frustração.

Esta seção detalha como essa força central se manifesta na sua personalidade, revelando talentos natos e a energia que você emana de forma inconsciente para as pessoas ao seu redor, sendo a base fundamental de todo o seu magnetismo pessoal.`,

  introNegativas: `
As Sequências Negativas dentro da Pirâmide Quântica não devem ser vistas como "má sorte", mas sim como padrões que indicam áreas de fricção e desafios recorrentes. Elas funcionam como alertas no seu mapa, apontando onde você tende a repetir erros, onde gasta energia de forma desnecessária ou onde possui bloqueios que impedem o seu crescimento.

Identificar essas sequências é o primeiro passo para quebrá-las e transmutar essa energia em aprendizado consciente. Muitas vezes, essas sequências representam lições que não foram totalmente integradas no passado e se manifestam como medos irracionais ou situações difíceis que parecem se repetir ciclicamente.

Ao compreender a natureza dessas vibrações desafiadoras, você ganha o poder da escolha. Em vez de ser uma vítima inconsciente desses padrões, você passa a ser o observador consciente que pode decidir agir de forma diferente diante dos gatilhos emocionais.

Esta análise é essencial para quem busca uma evolução real, pois revela exatamente o que precisa ser curado e fortalecido para que os seus caminhos se abram sem resistências, permitindo que a luz da sua essência brilhe sem as interferências desses ruídos energéticos.`,

  introEspeciais: `
As Sequências Especiais representam ocorrências pontuais e situações específicas que se manifestam em momentos determinados da sua trajetória. Diferente do seu Regente, que é constante, essas sequências surgem como "eventos" no seu campo vibracional, sinalizando uma fase onde certas energias estarão temporariamente mais intensas e disponíveis.

É fundamental entender que uma sequência especial não define quem você é, mas sim o que está acontecendo com você ou ao seu redor neste exato período. Elas funcionam como gatilhos de oportunidade ou de teste, exigindo uma postura diferenciada para que você possa colher os frutos dessa configuração momentânea sem se perder no excesso de intensidade que elas costumam carregar.

Muitas vezes, essas situações surgem para acelerar processos que estavam estagnados ou para trazer à tona verdades que precisam ser encaradas. Por serem passageiras, exigem atenção plena: se você não perceber o momento em que esse portal se abre, a energia se dissipa e a situação se altera, voltando ao fluxo normal do seu mapa.

Nesta parte do relatório, detalhamos a natureza dessa situação específica que o seu mapa apresenta agora, orientando sobre como agir enquanto essa influência estiver ativa para que você tire o melhor proveito desse evento cósmico singular.`,

  introFinanceiro: `
A análise da Sequência Financeira foca em uma vibração específica de manifestação material que se apresenta como uma circunstância favorável ou um desafio de fluxo em sua vida atual. Não tratamos aqui de uma condição permanente de riqueza ou escassez, mas sim de uma "janela financeira" — um momento onde a sua relação com a energia do dinheiro assume um padrão determinado.

Esta situação financeira descrita no seu mapa indica como as energias de prosperidade estão circulando no momento. Pode representar uma fase de colheita rápida, onde os esforços passados se materializam de forma súbita, ou um período que exige uma gestão mais estratégica e cautelosa para preparar o terreno para um salto futuro. É uma fotografia do seu momento material.

Entender essa vibração momentânea permite que você ajuste suas velas conforme o vento da prosperidade sopra. Se o momento é de expansão, você deve agir com audácia; se o momento é de consolidação, a prudência se torna sua melhor ferramenta. O segredo não está em mudar quem você é, mas em adaptar suas ações à situação financeira que os números indicam para este agora.

Lembre-se que as situações financeiras são dinâmicas. Ao compreender a vibração que rege o seu aspecto material neste período, você ganha a clareza necessária para tomar decisões mais assertivas, evitando desperdícios e potencializando cada oportunidade de ganho que essa frequência específica está tentando manifestar.`,
 
 introVigencias: `
As Vigências representam os ciclos de atuação das potências numerológicas ao longo da sua vida. Nada na natureza é estático, e com a nossa energia pessoal não seria diferente. As vigências dividem a sua trajetória em períodos específicos, cada um regido por uma vibração diferente que dita o "clima" das suas experiências.

Existem épocas para plantar silenciosamente e épocas para colher publicamente; momentos de introspecção profunda e fases de intensa atividade social e expansão. Compreender as suas vigências atuais permite que você pare de lutar contra a correnteza do tempo universal.

Se você está em uma vigência que pede introspecção e tenta forçar um crescimento externo agressivo, encontrará resistência e frustração. Por outro lado, se está em um ciclo de expansão e se mantém estagnado por medo, perderá oportunidades valiosas que podem não se repetir tão cedo.

Conhecer esses períodos ajuda você a planejar o seu futuro com inteligência estratégica e paciência, sabendo exatamente quando deve acelerar seus projetos e quando deve recuar para recarregar as energias. É a arte milenar de viver em harmonia com os ritmos naturais do seu próprio destino.`,

  agradecimento: `
Este relatório foi desenvolvido exclusivamente para apoiar o seu processo de autoconhecimento e despertar o seu potencial máximo. Lembre-se sempre de que os números indicam tendências, potências e caminhos, mas o livre-arbítrio é, e sempre será, o fator decisivo e soberano na sua jornada.

Você é o arquiteto da sua própria realidade e as informações aqui contidas servem como uma bússola de alta precisão, não como uma sentença imutável. Use este conhecimento para se fortalecer, para curar suas sombras e para brilhar sua luz única no mundo com muito mais intenção e propósito.

Gratidão por confiar no trabalho do Instinto Superior para guiar este mergulho profundo em sua essência. Esperamos que esta leitura seja o ponto de partida para uma vida muito mais consciente, plena e conectada com a sua verdade mais elevada.

Que a sabedoria dos números ilumine cada um de seus passos e que você tenha a coragem necessária para viver o destino grandioso que está codificado em seu nome e em sua data de nascimento desde o momento em que você chegou ao mundo.`
};
function montarSecao(nome,html){
 return `<div class="secao"><div class="tituloPiramide">${nome}</div>${html}</div>`;
}
