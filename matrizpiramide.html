<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pirâmide da Vida Quântica</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<style>
/* SEU CSS ORIGINAL MANTIDO INTEGRALMENTE */
body{ font-family: Arial; background:#ffffff; color:#000; text-align:center; }
input,button{ padding:10px; margin:5px; border-radius:6px; border:none; }
input { width: 600px; font-size: 18px; padding: 14px; background-color: #e5e7eb; border: 1px solid #ccc; color: #333; display: block; margin: 10px auto; }
button{ background:#facc15; font-weight:bold; cursor:pointer; }
.piramide{ font-family: monospace; font-size:12px; line-height:0.7; text-align:center; }
.piramide.compacta{ font-size:12px; line-height:1.2; }
.linha{ display:flex; justify-content:center; gap:6px; margin:2px; }
.num{ background:#28d3ee; color:#000; padding:4px 7px; border-radius:6px; font-weight:bold; font-size:16px; min-width:18px; }
.num.negativo{ background:#ff6b6b !important; color:white !important; }
.num.especial{ background:#f6c445 !important; color:#000 !important; box-shadow:0 0 10px rgba(246,196,69,0.8); }
.num.financeiro{ background:#34c759 !important; color:white !important; box-shadow:0 0 12px rgba(52,199,89,0.9); }
.box{ background:#ffffff; border:2px solid #000; padding:15px; margin:15px auto; border-radius:10px; max-width:800px; text-align: left; }
.gridRelatorios{ display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:25px; }
.aba{ margin-top:20px; display:none; }
.abas button{ background:#22d3ee; border:none; padding:10px 15px; margin:5px; border-radius:8px; cursor:pointer; font-weight:bold; }
@media (max-width: 768px) { input { width: 90% !important; } .gridRelatorios{ grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="relatorioTopo">
  <h2>Matriz Quântica da Vida</h2>
</div>

Nome completo igual a certidão<input id="nome" placeholder="">
Data de nascimento<input type="date" id="data">

<button onclick="gerar()">GERAR AS MATRIZES</button>
<button onclick="abrirPremium()">LIBERAR O RELATÓRIO E BAIXAR O PDF</button>

<div class="folhaRelatorio">
    <div id="resultado"></div>
    <div class="abas">
        <button onclick="mostrarAba('principal')">Principal / Vida</button>
        <button onclick="mostrarAba('pessoal')">Pessoal</button>
        <button onclick="mostrarAba('social')">Social</button>
        <button onclick="mostrarAba('destino')">Influência e Propósito</button>
    </div>

    <div id="aba_principal" class="aba" style="display:block"></div>
    <div id="aba_pessoal" class="aba"></div>
    <div id="aba_social" class="aba"></div>
    <div id="aba_destino" class="aba"></div>
</div>

<script src="textos.js"></script>

<script>
// === CONFIGURAÇÃO DE SEGURANÇA FIREBASE (MAKE/TRAVA) ===
const urlParams = new URLSearchParams(window.location.search);
const userEmail = urlParams.get('user'); 
const DB_URL = "https://vendas-numerologia-default-rtdb.firebaseio.com/";

async function verificarAcessoInicial() {
    if (!userEmail) { window.location.href = "index.html"; return; }
    try {
        const res = await fetch(`${DB_URL}vendas/${userEmail}.json`);
        const data = await res.json();
        if (data && data.status === 'usado') {
            alert("Este link já foi utilizado para gerar um relatório.");
            window.location.href = "index.html";
        }
    } catch (e) { console.error("Erro na trava:", e); }
}
verificarAcessoInicial();

// === MAPA CABALÍSTICO ===
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD"), base = normal[0], acentos = normal.slice(1);
    let vBase = mapa[base] ?? 0, sA = 0, mA = 1;
    for(let a of acentos){
        if(a==="\u0301") sA+=2; else if(a==="\u0302") sA+=7; else if(a==="\u0303") sA+=3;
        else if(a==="\u0327") sA+=6; else if(a==="\u0300" || a==="\u0308") mA*=2;
    }
    return (vBase + sA) * mA;
}

function reduzir(n){ while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); } return n; }

function nomeNumeros(nome){
    return nome.toUpperCase().split('').map(l => valorLetra(l)).filter(v => v > 0);
}

function piramide(base){
    let linhas=[base];
    while(base.length>1){
        let nova=[];
        for(let i=0;i<base.length-1;i++) nova.push(reduzir(base[i]+base[i+1]));
        linhas.push(nova); base=nova;
    }
    return linhas;
}

function topoArcanos(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++) arcanos.push(parseInt("" + base[i] + base[i+1]));
    return arcanos;
}

// === SINCRONIZADOR DE TEMPO MESTRE (PELA VIDA) ===
function gerarCronogramaMestre(arcanosVida, dataTxt) {
    let crono = [];
    const [ano, mes, dia] = dataTxt.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, cic = 0;
    while (idade < 100) {
        let n = arcanosVida[cic % arcanosVida.length];
        let dur = parseInt(n.toString()[0]) || 1;
        let ini = new Date(atual); atual.setFullYear(atual.getFullYear() + dur);
        crono.push({ idadeIni: idade, idadeFim: idade + dur, ini: ini.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'), idxArcano: cic });
        idade += dur; cic++;
    }
    return crono;
}

function montarVigencias(cronograma, arcanosDaAba, textosMapa) {
    let h = "<div class='box'><h3>⏳ Vigências (Sincronizadas)</h3>";
    cronograma.forEach(p => {
        let n = arcanosDaAba[p.idxArcano % arcanosDaAba.length];
        h += `<div class="box"><b>Idade: ${p.idadeIni} → ${p.idadeFim} anos</b><br>Período: ${p.ini} - ${p.fim}<br><br><strong>Potência ${n}:</strong> ${textosMapa[n] || "Interpretação em análise."}</div>`;
    });
    return h + "</div>";
}

// === DETECTORES VISUAIS (SEUS ORIGINAIS) ===
function detNeg(linhas){
    let pos=[];
    linhas.forEach((lin, i)=>{
        let c=1;
        for(let j=1;j<lin.length;j++){
            if(lin[j]===lin[j-1]) c++;
            else { if(c>=3) for(let k=j-c;k<j;k++) pos.push({l:i,idx:k}); c=1; }
        }
        if(c>=3) for(let k=lin.length-c;k<lin.length;k++) pos.push({l:i,idx:k});
    });
    return pos;
}

const seqEspLista = ["116","123","252","575","757","922","923","924","925","926","927"];
function detEsp(linhas){
    let pos=[];
    linhas.forEach((lin,i)=>{
        for(let j=0; j<lin.length-2; j++){
            let s = ""+lin[j]+lin[j+1]+lin[j+2];
            if(seqEspLista.includes(s)) pos.push({l:i,idx:j},{l:i,idx:j+1},{l:i,idx:j+2});
        }
    });
    return pos;
}

function detFin(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9) pos.push({l:i,idx:j},{l:i,idx:j+1},{l:i+1,idx:j});
        }
    }
    return pos;
}

function desenhar(linhas){
    const neg = detNeg(linhas), esp = detEsp(linhas), fin = detFin(linhas);
    let h=`<div class="piramide compacta">`;
    linhas.forEach((lin,i)=>{
        h += `<div class="linha">`;
        lin.forEach((n,j)=>{
            let c = "num";
            if(neg.some(p=>p.l===i && p.idx===j)) c+=" negativo";
            if(esp.some(p=>p.l===i && p.idx===j)) c+=" especial";
            if(fin.some(p=>p.l===i && p.idx===j)) c+=" financeiro";
            h += `<div class="${c}">${n}</div>`;
        });
        h += `</div>`;
    });
    return h + `</div>`;
}

// === LÓGICA PRINCIPAL ===
let pirPrincipalGlobal = null;

function gerar() {
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Preencha nome e data!");

    const base = nomeNumeros(nome);
    const [y, m, d] = data.split("-").map(Number);

    // Vida (Mestra do Tempo)
    const pV = piramide(base);
    pirPrincipalGlobal = pV;
    const aV = topoArcanos(base);
    const crono = gerarCronogramaMestre(aV, data);

    // ABA PRINCIPAL
    document.getElementById("aba_principal").innerHTML = desenhar(pV) + montarVigencias(crono, aV, textosVida);

    // PESSOAL (DIA)
    const pP = piramide(base.map(n => reduzir(n + reduzir(d))));
    document.getElementById("aba_pessoal").innerHTML = desenhar(pP) + montarVigencias(crono, topoArcanos(pP[0]), textosPessoal);

    // SOCIAL (MÊS)
    const pS = piramide(base.map(n => reduzir(n + reduzir(m))));
    document.getElementById("aba_social").innerHTML = desenhar(pS) + montarVigencias(crono, topoArcanos(pS[0]), textosSocial);

    // DESTINO (DIA + MÊS)
    const pD = piramide(base.map(n => reduzir(n + reduzir(reduzir(d) + reduzir(m)))));
    document.getElementById("aba_destino").innerHTML = desenhar(pD) + montarVigencias(crono, topoArcanos(pD[0]), textosDestino);

    mostrarAba('principal');
    alert("Matrizes geradas!");
}

function mostrarAba(n){
    document.querySelectorAll('.aba').forEach(a=>a.style.display='none');
    document.getElementById("aba_"+n).style.display="block";
}

async function abrirPremium() {
    if(!pirPrincipalGlobal) return alert("Gere as matrizes primeiro!");
    
    // TRAVA NO FIREBASE
    try {
        await fetch(`${DB_URL}vendas/${userEmail}.json`, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'usado' }),
            headers: { 'Content-Type': 'application/json' }
        });
    } catch(e) { console.error(e); }

    const pacote = {
        nome: document.getElementById("nome").value,
        data: document.getElementById("data").value,
        piramidePrincipal: document.getElementById("aba_principal").innerHTML,
        piramidePessoal: document.getElementById("aba_pessoal").innerHTML,
        piramideSocial: document.getElementById("aba_social").innerHTML,
        piramideDestino: document.getElementById("aba_destino").innerHTML
    };
    localStorage.setItem("relatorioPiramide", JSON.stringify(pacote));
    window.open("matriz-premium.html", "_blank");
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
}
</script>
</body>
</html>
