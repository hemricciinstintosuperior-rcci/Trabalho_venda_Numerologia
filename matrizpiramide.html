<script>

// =======================
// 🔢 TABELA CABALÍSTICA
// =======================
const mapa = {
A:1,I:1,Q:1,J:1,Y:1,
B:2,K:2,R:2,
C:3,G:3,L:3,S:3,
D:4,M:4,T:4,
E:5,H:5,N:5,
U:6,V:6,W:6,X:6,
O:7,Z:7,
F:8,P:8
};



// =======================

function valorLetra(letra){

  if(!letra || letra===" ") return 0;

  // separa letra e acentos
  let normal = letra.normalize("NFD");

  let base = normal[0];
  let acentos = normal.slice(1);

  let valorBase = mapa[base] ?? 0;

  let somaAcentos = 0;
  let multAcentos = 1;

  for(let a of acentos){

    if(a === "\u0301") somaAcentos += 2;      // agudo
    else if(a === "\u0302") somaAcentos += 7; // circunflexo
    else if(a === "\u0303") somaAcentos += 3; // til
    else if(a === "\u0327") somaAcentos += 6; // cedilha

    else if(a === "\u0300") multAcentos *= 2; // grave
    else if(a === "\u0308") multAcentos *= 2; // trema
  }

  return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
  while(n>9){
    n=n.toString().split('').reduce((a,b)=>+a+ +b,0);
  }
  return n;
}

function nomeNumeros(nome){
  nome=nome.toUpperCase();
  let arr=[];
  for(let l of nome){
    if(l===" ")continue;
    let v=valorLetra(l);
    if(v)arr.push(v);
  }
  return arr;
}

function piramide(base){
  let linhas=[base];
  while(base.length>1){
    let nova=[];
    for(let i=0;i<base.length-1;i++){
      nova.push(reduzir(base[i]+base[i+1]));
    }
    linhas.push(nova);
    base=nova;
  }
  return linhas;
}

// =======================
// 🚨 DETECTOR DE SEQUÊNCIAS NEGATIVAS
// =======================
function detectarSequencias(linhas){

  let sequencias=[];
  let posicoes=[];

  linhas.forEach((linha, i)=>{

    let cont=1;

    for(let j=1;j<linha.length;j++){

      if(linha[j] === linha[j-1]){
        cont++;
      }else{

        if(cont>=3){
          sequencias.push({
            numero: linha[j-1],
            repeticoes: cont
          });

          for(let k=j-cont;k<j;k++){
            posicoes.push({linha:i,indice:k});
          }
        }

        cont=1;
      }
}
// detectar sequência no FINAL da linha
if(cont >= 3){
  sequencias.push({
    numero: linha[linha.length-1],
    repeticoes: cont
  });

  for(let k = linha.length - cont; k < linha.length; k++){
    posicoes.push({linha:i, indice:k});
  }
}
   

  });

  return {sequencias,posicoes};
}

// =====================================
// ⭐ DETECTOR DE SEQUÊNCIAS ESPECIAIS
// =====================================
function detectarSequenciasEspeciais(linhas){

  let encontradas = new Set(); // evita repetição

  linhas.forEach(linha => {

    // percorre janela de 3 números consecutivos
    for(let i=0; i < linha.length-2; i++){

      let codigo =
        "" + linha[i] + linha[i+1] + linha[i+2];

      if(sequenciasEspeciais.includes(codigo)){
        encontradas.add(codigo);
      }

    }
  });

  return Array.from(encontradas);
}

// ⭐ POSIÇÕES DAS SEQUÊNCIAS ESPECIAIS NA PIRÂMIDE
function detectarPosicoesEspeciais(linhas){

  let posicoes = [];

  linhas.forEach((linha,i)=>{

    for(let j=0;j<linha.length-2;j++){

      let seq = "" + linha[j] + linha[j+1] + linha[j+2];

      if(sequenciasEspeciais[seq]){
        posicoes.push({linha:i, indice:j});
        posicoes.push({linha:i, indice:j+1});
        posicoes.push({linha:i, indice:j+2});
      }

    }

  });

  return posicoes;
}



function desenhar(linhas, compacta=false){

  let classe = compacta ? "piramide compacta" : "piramide";

  // 🔴 NEGATIVAS
  const analise = detectarSequencias(linhas);
  const posNeg = analise.posicoes;

  // ⭐ ESPECIAIS (posições já criadas anteriormente)
  const posEsp = detectarPosicoesEspeciais(linhas);

  // 💰 FINANCEIRA (99 com 9 abaixo)
  const posFin = detectarSequenciaFinanceira(linhas);

  function ehNegativo(i,j){
    return posNeg.some(p => p.linha===i && p.indice===j);
  }

  function ehEspecial(i,j){
    return posEsp.some(p => p.linha===i && p.indice===j);
  }

  function ehFinanceiro(i,j){
    return posFin.some(p => p.linha===i && p.indice===j);
  }

  let html=`<div class="${classe}">`;

  linhas.forEach((linha,i)=>{
    html += `<div class="linha">`;

    linha.forEach((n,j)=>{

      let classeNum = "num";

      if(ehNegativo(i,j))   classeNum += " negativo";
      if(ehEspecial(i,j))   classeNum += " especial";
      if(ehFinanceiro(i,j)) classeNum += " financeiro";

      html += `<div class="${classeNum}">${n}</div>`;
    });

    html += `</div>`;
  });

  html += `</div>`;
  return html;
}

// 💰 DETECTOR SEQUÊNCIA FINANCEIRA (99 com 9 abaixo)
function detectarSequenciaFinanceira(linhas){

  let posicoes = [];

  for(let i=0; i < linhas.length-1; i++){
    let linhaAtual = linhas[i];
    let linhaAbaixo = linhas[i+1];

    for(let j=0; j < linhaAtual.length-1; j++){

      // procura 99 lado a lado
      if(linhaAtual[j] === 9 && linhaAtual[j+1] === 9){

        // verifica se abaixo existe o 9 central
        if(linhaAbaixo[j] === 9){

          posicoes.push({linha:i, indice:j});
          posicoes.push({linha:i, indice:j+1});
          posicoes.push({linha:i+1, indice:j});
        }

      }

    }
  }

  return posicoes;
}


// ==========================================
// 🔄 FUNÇÃO DE VIGÊNCIAS COM LOOP INFINITO
// ==========================================
function vigencias(arcanos, data) {
  let lista = [];

  // Corrige o fuso horário da data
  const [ano, mes, dia] = data.split("-").map(Number);
  let atual = new Date(ano, mes - 1, dia);

  let idade = 0;
  let contadorCiclo = 0; // Controla a posição atual na pirâmide
  const IDADE_MAX = 106; // Agora vai até 106 anos sem erro

  while (idade < IDADE_MAX) {
    // 🔁 O SEGREDO: Uso do % para retornar ao início da lista de arcanos
    let indiceProtegido = contadorCiclo % arcanos.length;
    let a = arcanos[indiceProtegido];

    // Se por algum motivo o arcano falhar, evita o "undefined"
    if (a === undefined || a === null) a = 0;

    // Pega o primeiro dígito para definir a duração (ex: 53 dura 5 anos)
    let anosDuracao = parseInt(a.toString()[0]);
    if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;

    let inicio = new Date(atual);
    atual.setFullYear(atual.getFullYear() + anosDuracao);
    let fim = new Date(atual);

    lista.push({
      num: a,
      idadeIni: idade,
      idadeFim: idade + anosDuracao,
      ini: inicio.toLocaleDateString('pt-BR'),
      fim: fim.toLocaleDateString('pt-BR')
    });

    idade += anosDuracao;
    contadorCiclo++; // Avança para o próximo arcano da lista
  }

  return lista;
}

// 📜 EXIBIÇÃO DAS VIGÊNCIAS (SEM UNDEFINED)

// gera pirâmide aplicando um fator (dia / mês / destino)
// o fator entra SOMENTE na soma dos pares
function piramideComFator(baseNome, fator){

  let base = baseNome.map(n => reduzir(n + fator));
  let linhas=[base];

  while(base.length>1){
    let nova=[];
    for(let i=0;i<base.length-1;i++){
      nova.push(reduzir(base[i]+base[i+1]));
    }
    linhas.push(nova);
    base=nova;
  }

  return linhas;
}

// ===== PIRÂMIDE PESSOAL (DIA)
function piramidePessoal(baseNome,dia){
  let fator = reduzir(dia);
  return piramideComFator(baseNome,fator);
}

// ===== PIRÂMIDE SOCIAL (MÊS)
function piramideSocial(baseNome,mes){
  let fator = reduzir(mes);
  return piramideComFator(baseNome,fator);
}

// ===== PIRÂMIDE DESTINO (DIA + MÊS)
function piramideDestino(baseNome,dia,mes){
  let fator = reduzir(reduzir(dia) + reduzir(mes));
  return piramideComFator(baseNome,fator);
}

function gerarRelatorioSequencias(linhas, textosMapa){

  const resultado = detectarSequencias(linhas);
  const seq = resultado.sequencias;

  let html="<div class='boxSeq'><h3>⚠️ Sequências Numéricas Negativas</h3>";

  if(seq.length===0){
    html+="Você não possui sequências numéricas negativas nesta pirâmide.";
  }else{
    seq.forEach(s=>{
      html+=`
      <div class="box">
        <h3>Sequência de ${s.numero}</h3>
        ${textosMapa[s.numero] ?? ""}
      </div>`;
    });
  }

  html+="</div>";
  return html;
}

// 🔴 PIRÂMIDES GLOBAIS (necessário para o botão funcionar)
let pirPrincipal;

// 🔺 GERA ARCANO DO TOPO (pares da base)
function topo(base){

  let arcanos = [];

  for(let i=0;i<base.length-1;i++){
    arcanos.push(
      parseInt("" + base[i] + base[i+1])
    );
  }

  return arcanos;
}

function gerar() {
  nomeTxt = document.getElementById("nome").value;
  dataTxt = document.getElementById("data").value;

  baseNome = nomeNumeros(nomeTxt);

  // =========================
  // 🔺 PIRÂMIDE PRINCIPAL (VIDA) - COMPLETA
  // =========================
  pirPrincipal = piramide(baseNome);
  regPrincipal = pirPrincipal.at(-1)[0];
  arcanosPrincipal = topo(baseNome);
  vig = vigencias(arcanosPrincipal, dataTxt);

  document.getElementById("aba_principal").innerHTML =
    explicacoes.principal +
    `<h2 style="text-align:center">🔺 Pirâmide da Vida</h2>` +

        ${gerarRelatorioEspeciaisCompacto(pirPrincipal)}
        ${gerarRelatorioFinanceiroCompacto(pirPrincipal)}
     </div>` +
    montarVigencias(vig, textosVida);

  // =========================
  // 👤 PIRÂMIDE PESSOAL - APENAS DESENHO E VIGÊNCIAS
  // =========================
  pirPes = piramidePessoal(baseNome, dia);
  arcanosPes = topo(pirPes[0]);
  let vigPes = vigencias(arcanosPes, dataTxt);

  document.getElementById("aba_pessoal").innerHTML =
    explicacoes.pessoal +
    `<h2 style="text-align:center">👤 Pirâmide Pessoal</h2>` +
    desenhar(pirPes, true) + 
    montarVigencias(vigPes, textosPessoal, arcanosPes);

  // =========================
  // 🌎 PIRÂMIDE SOCIAL - APENAS DESENHO E VIGÊNCIAS
  // =========================
  pirSoc = piramideSocial(baseNome, mes);
  arcanosSoc = topo(pirSoc[0]);
  let vigSoc = vigencias(arcanosSoc, dataTxt);

  document.getElementById("aba_social").innerHTML =
    explicacoes.social +
    `<h2 style="text-align:center">🌎 Pirâmide Social</h2>` +
    desenhar(pirSoc, true) +
    montarVigencias(vigSoc, textosSocial, arcanosSoc);

  // =========================
  // ⭐ PIRÂMIDE DESTINO - APENAS DESENHO E VIGÊNCIAS
  // =========================
  pirDes = piramideDestino(baseNome, dia, mes);
  arcanosDes = topo(pirDes[0]);
  let vigDes = vigencias(arcanosDes, dataTxt);

  document.getElementById("aba_destino").innerHTML =
    explicacoes.destino +
    `<h2 style="text-align:center">⭐ Pirâmide Destino</h2>` +
    desenhar(pirDes, true) +
    montarVigencias(vigDes, textosDestino, arcanosDes);
}

// =====================================
// 🔴 DETECTOR DE SEQUÊNCIAS NEGATIVAS
// =====================================
function detectarSequenciasNegativas(linhas){

  let contagem = {}; // {numero: quantidade}

  linhas.forEach(linha=>{
    linha.forEach(num=>{
      contagem[num] = (contagem[num] || 0) + 1;
    });
  });

  let sequencias = [];

  for(let num in contagem){
    if(contagem[num] >= 3){
      sequencias.push(Number(num));
    }
  }

  return sequencias;

function detectarSequenciasEspeciais(linhas){

  let encontradas = new Set();

  linhas.forEach(linha => {

    for(let i=0; i < linha.length-2; i++){

      let codigo = "" + linha[i] + linha[i+1] + linha[i+2];

      if(sequenciasEspeciais[codigo]){
        encontradas.add(codigo);
      }

    }
  });

  return Array.from(encontradas);
}

// 💰 DETECTOR SEQUÊNCIA FINANCEIRA (99 com 9 abaixo)
function detectarSequenciaFinanceira(linhas){

  let posicoes = [];

  for(let i=0;i<linhas.length-1;i++){

    let linhaAtual = linhas[i];
    let linhaBaixo = linhas[i+1];

    for(let j=0;j<linhaAtual.length-1;j++){

      // encontrou 99
      if(linhaAtual[j]===9 && linhaAtual[j+1]===9){

        // posição do número abaixo (centro)
        if(linhaBaixo[j]===9){

          // marca os 3 números
          posicoes.push({linha:i, indice:j});
          posicoes.push({linha:i, indice:j+1});
          posicoes.push({linha:i+1, indice:j});
        }
      }
    }
  }

  return posicoes;
}

function gerarRelatorioEspeciais(piramide){

  // usa a MESMA detecção da pirâmide
  const encontrados = detectarSequenciasEspeciais(piramide);

  if(encontrados.length === 0){
    return `
      <div class="box">
        <h3>⭐ Sequências Especiais</h3>
        Nenhuma sequência especial encontrada.
      </div>
    `;
  }

  let html = `<div class="box"><h3>⭐ Sequências Especiais</h3>`;

  encontrados.forEach(seq=>{
    html += `
      <div class="cardSeq">
        <h4>Sequência ${seq}</h4>
        <p>${sequenciasEspeciais[seq]}</p>
      </div>`;
  });

  html += "</div>";

  return html;

function gerarRelatorioSequencias(linhas, textosSeq){

  const analise = detectarSequencias(linhas);
  const sequencias = analise.sequencias;

  // remover duplicadas (se aparecer em várias linhas)
  const numerosUnicos = [...new Set(sequencias.map(s => s.numero))];

  // se não existir nenhuma sequência
  if(numerosUnicos.length === 0){
    return `
      <div class="box">
        <h3>✨ Nenhuma sequência negativa encontrada</h3>
        <p>Não foram identificadas repetições numéricas negativas nesta pirâmide.</p>
      </div>
    `;
  }

  let html = `<h2>⚠️ Sequências Numéricas Negativas</h2>`;

  numerosUnicos.forEach(num => {
    html += `
      <div class="box">
        <h3>Sequência de ${num}</h3>
        <p>${textosSeq[num] ?? "Texto não cadastrado."}</p>
      </div>
    `;
  });

  return html;
}
