<style>

/* BASE RESPONSIVA */
body{ font-family: Arial, sans-serif; background:#ffffff; color:#000; text-align:center; margin: 0; padding: 10px; }
input, button{ padding:12px; margin:8px auto; border-radius:8px; border:none; display: block; box-sizing: border-box; }

/* AJUSTE DOS INPUTS PARA CELULAR */
input { 
    width: 100%; 
    max-width: 600px; 
    font-size: 18px; 
    background-color: #f3f4f6; 
    border: 1px solid #d1d5db; 
}

/* BOTÕES MAIORES PARA O DEDO (TOUCH) */
button{ 
    background:#facc15; 
    font-weight:bold; 
    cursor:pointer; 
    width: 100%; 
    max-width: 600px; 
    transition: transform 0.1s;
}
button:active { transform: scale(0.98); }

/* PIRÂMIDE FLEXÍVEL */
.piramide.compacta { 
    font-size: 3.2vw; /* Tamanho da fonte baseado na largura da tela */
    line-height: 1.2; 
    overflow-x: auto; /* Permite scroll se for muito grande */
    padding: 10px 0;
}

.linha{ display:flex; justify-content:center; gap:1vw; margin:2px; }

.num{ 
    background:#28d3ee; 
    color:#000; 
    padding: 4px 1.5vw; 
    border-radius:4px; 
    font-weight:bold; 
    min-width: 20px;
}

/* ABAS EM GRADE NO CELULAR */
.abas { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    gap: 8px; 
    margin-bottom: 20px; 
}

.folhaRelatorio{ 
    background:white; 
    width: 100%; 
    max-width:800px; 
    margin:20px auto; 
    padding: 20px 10px; 
    border-radius:10px; 
    box-shadow:0 0 15px rgba(0,0,0,0.05); 
}

@media(min-width: 768px) {
    .num { padding: 4px 7px; font-size: 16px; }
    .linha { gap: 6px; }
    .piramide.compacta { font-size: 12px; }
    .abas { display: block; }
}

</head>
<body>

<h2>Matriz Quântica da Vida</h2>
Nome completo igual a certidão<input id="nome" placeholder="">
Data de nascimento<input type="date" id="data">

<button onclick="gerar()">GERAR AS MATRIZES</button>
<button onclick="abrirPremium()">LIBERAR O RELATÓRIO E BAIXAR O PDF</button>

<div class="folhaRelatorio">
    <div class="abas">
        <button onclick="mostrarAba('principal')">Principal / Vida</button>
        <button onclick="mostrarAba('pessoal')">Pessoal</button>
        <button onclick="mostrarAba('social')">Social</button>
        <button onclick="mostrarAba('destino')">Influência e Propósito</button>
    </div>

    <div id="aba_principal" class="aba" style="display:block"></div>
    <div id="aba_pessoal" class="aba"></div>
    <div id="aba_social" class="aba"></div>
    <div id="aba_destino" class="aba"></div>
</div>

<script src="textosmatriz.js"></script>

<script>


// Adicione isso no topo do seu script principal
const textos = window.textos || {
    introRegente: "O Regente é o coração da sua pirâmide...",
    introNegativas: "As Sequências Negativas revelam desafios vibracionais...",
    introEspeciais: "As Sequências Especiais representam ocorrências pontuais...",
    introFinanceiro: "A análise financeira foca na prosperidade...",
    introVigencias: "As Vigências representam os ciclos de atuação das potências..."
};
    
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0];
    let acentos = normal.slice(1);
    let valorBase = mapa[base] ?? 0;
    let somaAcentos = 0, multAcentos = 1;
    for(let a of acentos){
        if(a === "\u0301") somaAcentos += 2;
        else if(a === "\u0302") somaAcentos += 7;
        else if(a === "\u0303") somaAcentos += 3;
        else if(a === "\u0327") somaAcentos += 6;
        else if(a === "\u0300") multAcentos *= 2;
        else if(a === "\u0308") multAcentos *= 2;
    }
    return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
    while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); }
    return n;
}

function nomeNumeros(nome){
    nome=nome.toUpperCase();
    let arr=[];
    for(let l of nome){ if(l!==" "){ let v=valorLetra(l); if(v)arr.push(v); } }
    return arr;
}

function piramide(base){
    let linhas=[base];
    while(base.length>1){
        let nova=[];
        for(let i=0;i<base.length-1;i++){ nova.push(reduzir(base[i]+base[i+1])); }
        linhas.push(nova);
        base=nova;
    }
    return linhas;
}

function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

// === CÁLCULO DE VIGÊNCIA POR AMPLITUDE (DIAGONAL CORRIGIDO) ===
function calcularVigenciaPorPosicao(linha, coluna, cronograma) {
    let indiceInicio = coluna;
    let indiceFim = coluna + linha; 

    let periodosAfetados = cronograma.filter(p => p.indiceArcano >= indiceInicio && p.indiceArcano <= indiceFim);

    if (periodosAfetados.length === 0) return "Fase de transição";

    let idadeIni = periodosAfetados[0].idadeIni;
    let idadeFim = periodosAfetados[periodosAfetados.length - 1].idadeFim;

    return `${idadeIni} a ${idadeFim} anos`;
}

// === RELATÓRIOS GRUPADOS (EVITA REPETIÇÃO E ERRO DE CONTAGEM) ===
function gerarRelatorioNegativasComVigencia(linhas, crono) {
    const { posNeg } = detectarSequencias(linhas);
    let h = `<div class="box"><h3 style="color:#d32f2f;">⚠️ Sequências Negativas</h3>`;
    
    let gruposContados = new Set();
    let encontrou = false;

    posNeg.forEach(p => {
        let num = linhas[p.linha][p.indice];
        // Criamos uma chave que identifica o número e a linha para não repetir o mesmo bloco
        let idGrupo = `neg-${num}-L${p.linha}`;

        if (!gruposContados.has(idGrupo)) {
            encontrou = true;
            gruposContados.add(idGrupo);

            let vigencia = calcularVigenciaPorPosicao(p.linha, p.indice, crono);
            h += `<div style="margin-bottom:12px; border-left:4px solid #ff6b6b; padding-left:10px; text-align:left;">
                    <b style="font-size:16px;">🚫 Sequência ${num}</b><br>
                    <small><b>Período Crítico:</b> ${vigencia}</small><br>
                    <span style="font-size:14px; color:#444;">${textosSeqNeg[num] || 'Desafio vibracional detectado.'}</span>
                  </div>`;
        }
    });
    return encontrou ? h + "</div>" : "";
}

function gerarRelatorioEspeciaisComVigencia(linhas, crono) {
    let h = `<div class="box"><h3 style="color:#b8860b;">⭐ Impactos Especiais</h3>`;
    let gruposContados = new Set();
    let encontrou = false;

    linhas.forEach((linha, i) => {
        for (let j = 0; j < linha.length - 2; j++) {
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            if (sequenciasEspeciais[seq]) {
                // Identificamos o impacto pela posição inicial dele
                let idImpacto = `esp-${seq}-L${i}-C${j}`;

                if (!gruposContados.has(idImpacto)) {
                    encontrou = true;
                    gruposContados.add(idImpacto);

                    let vigencia = calcularVigenciaPorPosicao(i, j, crono);
                    h += `<div style="margin-bottom:12px; border-left:4px solid #f6c445; padding-left:10px; text-align:left;">
                            <b style="font-size:16px;">✨ Impacto ${seq}</b><br>
                            <small><b>Período Ativo:</b> ${vigencia}</small><br>
                            <span style="font-size:14px; color:#444;">${sequenciasEspeciais[seq]}</span>
                          </div>`;
                }
            }
        }
    });
    return encontrou ? h + "</div>" : "";
}

function gerarRelatorioFinanceiroComVigencia(linhas, crono) {
    const posFin = detectarSequenciaFinanceira(linhas);
    let h = `<div class="box"><h3 style="color:#2e7d32;">💰 Fluxos de Prosperidade</h3>`;
    
    // ESTA É A CHAVE: Usamos um Set para guardar apenas o "início" de cada grupo 99/9
    let gruposIdentificados = new Set();
    let contadorReal = 0;

    posFin.forEach(p => {
        // Criamos uma identificação única para o grupo baseada na posição do primeiro '9'
        // Isso impede que o sistema conte os outros '9' do mesmo conjunto
        let idGrupo = `linha-${p.linha}-col-${p.indice}`;
        
        // A mágica acontece aqui: só processa se for o primeiro '9' do grupo de três
        if (!gruposIdentificados.has(idGrupo)) {
            // Marcamos este grupo e os seus vizinhos para não serem repetidos
            gruposIdentificados.add(`linha-${p.linha}-col-${p.indice}`);
            gruposIdentificados.add(`linha-${p.linha}-col-${p.indice + 1}`);
            gruposIdentificados.add(`linha-${p.linha + 1}-col-${p.indice}`);

            let vigencia = calcularVigenciaPorPosicao(p.linha, p.indice, crono);
            h += `<div style="margin-bottom:12px; border-left:4px solid #34c759; padding-left:10px; text-align:left;">
                    <b style="font-size:16px;">✅ Sequência Financeira 99/9</b><br>
                    <small><b>Janela de Oportunidade:</b> ${vigencia}</small><br>
                    <span style="font-size:14px; color:#444;">Momento de colheita material e expansão financeira conforme a matriz.</span>
                  </div>`;
            contadorReal++;
        }
    });

    return contadorReal > 0 ? h + "</div>" : "";
}

// === CRONOGRAMA E DETECÇÃO ===
function gerarCronogramaMestre(arcanosVida, data) {
    let cronograma = [];
    const [ano, mes, dia] = data.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, contadorCiclo = 0;
    while (idade < 100) {
        let indice = contadorCiclo % arcanosVida.length;
        let arc_ref = arcanosVida[indice];
        let anosDuracao = parseInt(arc_ref.toString()[0]);
        if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;
        let inicio = new Date(atual);
        atual.setFullYear(atual.getFullYear() + anosDuracao);
        cronograma.push({
            idadeIni: idade, idadeFim: idade + anosDuracao,
            ini: inicio.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'),
            indiceArcano: indice 
        });
        idade += anosDuracao;
        contadorCiclo++;
    }
    return cronograma;
}

function montarVigenciasSincronizadas(cronograma, arcanosDaPiramide, textosMapa) {
    let html = "<div class='box'><h3>⏳ Fluxo das Potências Quânticas</h3>";
    cronograma.forEach((periodo) => {
        let indiceTopo = periodo.indiceArcano % arcanosDaPiramide.length;
        let numArcano = arcanosDaPiramide[indiceTopo];
        html += `<div class="box" style="text-align:left;">
                 <h4 style="margin:0; color:#111827;">🔹 Potência ${numArcano} (${periodo.idadeIni} a ${periodo.idadeFim} anos)</h4>
                 <p style="font-size:14px; margin-top:5px;">${textosMapa[numArcano] || "<i>Interpretação em análise.</i>"}</p>
                 </div>`;
    });
    return html + "</div>";
}

function detectarSequencias(linhas){
    let posNeg=[]; let sequencias=[];
    linhas.forEach((linha, i)=>{
        let cont=1;
        for(let j=1;j<linha.length;j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont>=3){
                    sequencias.push({numero: linha[j-1], repeticoes: cont});
                    for(let k=j-cont;k<j;k++) posNeg.push({linha:i,indice:k});
                }
                cont=1;
            }
        }
        if(cont>=3){
            sequencias.push({numero: linha[linha.length-1], repeticoes: cont});
            for(let k=linha.length-cont;k<linha.length;k++) posNeg.push({linha:i,indice:k});
        }
    });
    return {sequencias, posNeg};
}

const sequenciasEspeciais = {
    "116": `Sua imagem pública e reputação podem ser postas à prova...`,
    "123": `Fase brilhante de justo reconhecimento...`,
    "252": `Encerramento em vínculos afetivos...`,
    "575": `Reviravoltas súbitas na segurança material...`,
    "757": `Ciclo de transformações intensas...`,
    "922": `Vitórias em concursos e mérito acadêmico...`,
    "923": `Paz e entendimento no ambiente doméstico...`,
    "924": `Conexões sociais com prestígio e autoridade...`,
    "925": `Discernimento redobrado com quem confia...`,
    "926": `Cuidado e paciência com laços familiares...`,
    "927": `Atenção a bastidores e segredos do passado...`
};

function detectarPosicoesEspeciais(linhas){
    let pos=[];
    linhas.forEach((linha,i)=>{
        for(let j=0;j<linha.length-2;j++){
            let seq = "" + linha[j] + linha[j+1] + linha[j+2];
            if(sequenciasEspeciais[seq]){ pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i, indice:j+2}); }
        }
    });
    return pos;
}

function detectarSequenciaFinanceira(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9){
                pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i+1, indice:j});
            }
        }
    }
    return pos;
}

function desenhar(linhas, compacta=false){
    let classe = compacta ? "piramide compacta" : "piramide";
    const neg = detectarSequencias(linhas).posNeg;
    const esp = detectarPosicoesEspeciais(linhas);
    const fin = detectarSequenciaFinanceira(linhas);
    let html=`<div class="${classe}">`;
    linhas.forEach((linha,i)=>{
        html += `<div class="linha">`;
        linha.forEach((n,j)=>{
            let c = "num";
            if(neg.some(p=>p.linha===i && p.indice===j)) c+=" negativo";
            if(esp.some(p=>p.linha===i && p.indice===j)) c+=" especial";
            if(fin.some(p=>p.linha===i && p.indice===j)) c+=" financeiro";
            html += `<div class="${c}">${n}</div>`;
        });
        html += `</div>`;
    });
    return html + `</div>`;
}

function piramidePessoal(baseNome, dia) { return piramide(baseNome.map(n => reduzir(n + reduzir(dia)))); }
function piramideSocial(baseNome, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(mes)))); }
function piramideDestino(baseNome, dia, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(reduzir(dia) + reduzir(mes))))); }

function mostrarAba(nome){
    document.querySelectorAll('.aba').forEach(a=>a.style.display='none');
    document.getElementById("aba_"+nome).style.display="block";
}

// === FUNÇÃO GERAR (ALERTAS ABAIXO DA PIRÂMIDE) ===
function montarConteudoComIntros(pir, reg, txtReg, cron, tMapa, titulo) {
    let r = `<h2 class="tituloPiramide">${titulo}</h2>`;
    r += desenhar(pir, true);
    
    // REGENTE COM INTRO
    r += `<div class="box">
            <p style="font-size:14px; color:#666; font-style:italic; margin-bottom:5px;">${textos.introRegente}</p>
            <h2>⭐ Regente: ${reg}</h2>${txtReg[reg] || ''}
          </div>`;
    
    // NEGATIVAS COM INTRO
    const neg = gerarRelatorioNegativasComVigencia(pir, cron);
    if(neg) r += `<div class="box"><p style="font-size:14px; color:#666; font-style:italic;">${textos.introNegativas}</p>${neg}</div>`;

    // ESPECIAIS COM INTRO
    const esp = gerarRelatorioEspeciaisComVigencia(pir, cron);
    if(esp) r += `<div class="box"><p style="font-size:14px; color:#666; font-style:italic;">${textos.introEspeciais}</p>${esp}</div>`;

    // FINANCEIRO COM INTRO
    const fin = gerarRelatorioFinanceiroComVigencia(pir, cron);
    if(fin) r += `<div class="box"><p style="font-size:14px; color:#666; font-style:italic;">${textos.introFinanceiro}</p>${fin}</div>`;

    // VIGÊNCIAS COM INTRO
    r += `<div class="box"><p style="font-size:14px; color:#666; font-style:italic;">${textos.introVigencias}</p>${montarVigenciasSincronizadas(cron, topo(pir[0]), tMapa)}</div>`;
    
    return r;
}

function gerar() {
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Preencha os dados!");

    const base = nomeNumeros(nome);
    const [y, m, d] = data.split("-").map(Number);
    const pVida = piramide(base);
    const aVida = topo(base);
    const crono = gerarCronogramaMestre(aVida, data);
    
    // Gerando cada aba
    const htmlVida = montarConteudoComIntros(pVida, pVida.at(-1)[0], textosVida, crono, textosVida, "Matriz da Vida");
    const htmlPessoal = montarConteudoComIntros(piramidePessoal(base, d), piramidePessoal(base, d).at(-1)[0], textosPessoal, crono, textosPessoal, "Matriz Pessoal");
    const htmlSocial = montarConteudoComIntros(piramideSocial(base, m), piramideSocial(base, m).at(-1)[0], textosSocial, crono, textosSocial, "Matriz Social");
    const htmlDestino = montarConteudoComIntros(piramideDestino(base, d, m), piramideDestino(base, d, m).at(-1)[0], textosDestino, crono, textosDestino, "Matriz de Destino");

    // Exibindo na tela
    document.getElementById("aba_principal").innerHTML = htmlVida;
    document.getElementById("aba_pessoal").innerHTML = htmlPessoal;
    document.getElementById("aba_social").innerHTML = htmlSocial;
    document.getElementById("aba_destino").innerHTML = htmlDestino;

    // SALVANDO TUDO PARA O PREMIUM
    localStorage.setItem("relatorioPiramide", JSON.stringify({
        nome, 
        data: data.split("-").reverse().join("/"),
        abaPrincipal: htmlVida,
        abaPessoal: htmlPessoal,
        abaSocial: htmlSocial,
        abaDestino: htmlDestino
    }));
    mostrarAba('principal');
}

async function abrirPremium() {
    // 1. Verifica se os dados foram preenchidos
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Por favor, preencha os dados e gere as matrizes primeiro.");

    // 2. Marca no Firebase que o link foi usado (A Trava)
    try {
        await fetch(`${DB_URL}vendas/${userEmail}.json`, { 
            method: 'PATCH', 
            body: JSON.stringify({ status: 'usado' }),
            headers: { 'Content-Type': 'application/json' }
        });
    } catch (e) {
        console.error("Erro ao registrar uso");
    }

    // 3. Prepara o pacote para o Premium (mantendo sua estrutura)
    const pacote = {
        nome: nome,
        data: data,
        piramidePrincipal: document.getElementById("aba_principal").innerHTML,
        piramidePessoal: document.getElementById("aba_pessoal").innerHTML,
        piramideSocial: document.getElementById("aba_social").innerHTML,
        piramideDestino: document.getElementById("aba_destino").innerHTML
    };
    
    localStorage.setItem("relatorioPiramide", JSON.stringify(pacote));
    
    // 4. Abre o relatório e redireciona a página atual para impedir reuso imediato
    window.open("matriz-premium.html", "_blank");
    setTimeout(() => { window.location.href = "index.html"; }, 1000);
}
</script>
</body>
