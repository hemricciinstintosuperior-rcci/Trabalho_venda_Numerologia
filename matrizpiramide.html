<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pirâmide da Vida Quântica</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<style>
/* Mantive todo o seu CSS original para não mudar o visual */
body{ font-family: Arial; background:#ffffff; color:#000; text-align:center; }
input,button{ padding:10px; margin:5px; border-radius:6px; border:none; }
input { width: 600px; font-size: 18px; padding: 14px; background-color: #e5e7eb; border: 1px solid #ccc; color: #333; display: block; margin: 10px auto; }
button{ background:#facc15; font-weight:bold; cursor:pointer; }
.piramide{ font-family: monospace; font-size:12px; line-height:0.7; text-align:center; }
.piramide.compacta{ font-size:12px; line-height:1.2; }
.linha{ display:flex; justify-content:center; gap:6px; margin:2px; }
.num{ background:#28d3ee; color:#000; padding:4px 7px; border-radius:6px; font-weight:bold; font-size:16px; min-width:18px; }
.negativo{ background:#FF0000!important; color:#fff !important; }
.box{ background:#ffffff; border:2px solid #000; padding:15px; margin:15px auto; border-radius:10px; max-width:800px; }
.gridRelatorios{ display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:25px; }
.aba{ margin-top:20px; display:none; }
.num.negativo{ background:#ff6b6b; color:white; }
.num.especial{ background:#f6c445; color:#000; box-shadow:0 0 10px rgba(246,196,69,0.8); }
.num.financeiro{ background:#34c759; color:white; box-shadow:0 0 12px rgba(52,199,89,0.9); }
@media (max-width: 768px) { input { width: 90% !important; } }
</style>
</head>
<body>

<h2>Matriz Quântica da Vida</h2>
Nome completo igual a certidão<input id="nome" placeholder="">
Data de nascimento<input type="date" id="data">

<button onclick="gerar()">GERAR AS MATRIZES</button>
<button onclick="abrirPremium()">LIBERAR O RELATÓRIO E BAIXAR O PDF</button>

<div class="folhaRelatorio">
    <div id="resultado"></div>
    <div class="abas">
        <button onclick="mostrarAba('principal')">Principal / Vida</button>
        <button onclick="mostrarAba('pessoal')">Pessoal</button>
        <button onclick="mostrarAba('social')">Social</button>
        <button onclick="mostrarAba('destino')">Influência e Propósito</button>
    </div>

    <div id="aba_principal" class="aba" style="display:block"></div>
    <div id="aba_pessoal" class="aba"></div>
    <div id="aba_social" class="aba"></div>
    <div id="aba_destino" class="aba"></div>
</div>

<script src="textosmatriz.js"></script>

<script>
// --- CONFIGURAÇÃO DE SEGURANÇA E TRAVA ATIVA ---
const urlParams = new URLSearchParams(window.location.search);
const userEmail = urlParams.get('user'); 
const DB_URL = "https://vendas-numerologia-default-rtdb.firebaseio.com/";

// Variáveis Globais para controle
let pirPrincipalGlobal = null;

// 🛡️ TRAVA DE ENTRADA: Verifica se o e-mail já foi usado ANTES de qualquer coisa
async function verificarStatusInicial() {
    if (!userEmail) {
        alert("Acesso não autorizado.");
        window.location.href = "index.html";
        return;
    }
    try {
        const response = await fetch(`${DB_URL}vendas/${userEmail}.json`);
        const dados = await response.json();
        if (dados && dados.status === 'usado') {
            alert("Este acesso já foi utilizado e o relatório gerado.");
            window.location.href = "index.html";
        }
    } catch (e) { console.error("Erro na trava:", e); }
}
verificarStatusInicial();

// --- LÓGICA DE CÁLCULO (MANTIDA) ---
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0], acentos = normal.slice(1);
    let vB = mapa[base] ?? 0;
    let sA = 0, mA = 1;
    for(let a of acentos){
        if(a==="\u0301") sA+=2; else if(a==="\u0302") sA+=7; else if(a==="\u0303") sA+=3;
        else if(a==="\u0327") sA+=6; else if(a==="\u0300" || a==="\u0308") mA*=2;
    }
    return (vB + sA) * mA;
}

function reduzir(n){ while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); } return n; }
function nomeNumeros(nome){ return nome.toUpperCase().split('').map(l=>valorLetra(l)).filter(v=>v>0); }
function piramide(base){
    let linhas=[base];
    while(base.length>1){
        let nova=[];
        for(let i=0;i<base.length-1;i++){ nova.push(reduzir(base[i]+base[i+1])); }
        linhas.push(nova); base=nova;
    }
    return linhas;
}
function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

// --- SINCRONIZADOR DE TEMPO MESTRE ---
function gerarCronogramaMestre(arcanosVida, data) {
    let crono = []; const [y, m, d] = data.split("-").map(Number);
    let atual = new Date(y, m-1, d); let idade = 0, ciclo = 0;
    while (idade < 100) {
        let n = arcanosVida[ciclo % arcanosVida.length];
        let anos = parseInt(n.toString()[0]) || 1;
        let ini = new Date(atual); atual.setFullYear(atual.getFullYear() + anos);
        crono.push({ idadeIni: idade, idadeFim: idade + anos, ini: ini.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'), idx: ciclo });
        idade += anos; ciclo++;
    }
    return crono;
}

function montarVigenciasSincronizadas(cronograma, arcanosDaPiramide, textosMapa) {
    let h = "<div class='box'><h3>⏳ Vigências</h3>";
    cronograma.forEach(p => {
        let n = arcanosDaPiramide[p.idx % arcanosDaPiramide.length];
        h += `<div class="box"><h3>🔹 Potência ${n}</h3><b>Idade:</b> ${p.idadeIni} → ${p.idadeFim} anos<br><b>Período:</b> ${p.ini} - ${p.fim}<br><br>${textosMapa[n] || "Interpretação em análise."}</div>`;
    });
    return h + "</div>";
}

// --- DETECTORES VISUAIS ---
function detectarSequencias(linhas){
    let pN=[]; let seq=[];
    linhas.forEach((lin, i)=>{
        let c=1;
        for(let j=1;j<lin.length;j++){
            if(lin[j] === lin[j-1]) c++;
            else { if(c>=3){ seq.push({n:lin[j-1], r:c}); for(let k=j-c;k<j;k++) pN.push({l:i,idx:k}); } c=1; }
        }
        if(c>=3){ seq.push({n:lin[lin.length-1], r:c}); for(let k=lin.length-c;k<lin.length;k++) pN.push({l:i,idx:k}); }
    });
    return {seq, pN};
}

const sequenciasEspeciaisCodigos = ["116","123","252","575","757","922","923","924","925","926","927"];

function desenhar(linhas, compacta=false){
    let cl = compacta ? "piramide compacta" : "piramide";
    const neg = detectarSequencias(linhas).pN;
    let h=`<div class="${cl}">`;
    linhas.forEach((lin,i)=>{
        h += `<div class="linha">`;
        lin.forEach((n,j)=>{
            let c = "num";
            if(neg.some(p=>p.l===i && p.idx===j)) c+=" negativo";
            // Lógica simples para destaque financeiro e especial
            if(i < linhas.length-1 && lin[j]===9 && lin[j+1]===9 && linhas[i+1][j]===9) c+=" financeiro";
            h += `<div class="${c}">${n}</div>`;
        });
        h += `</div>`;
    });
    return h + `</div>`;
}

// --- FUNÇÃO GERAR ---
function gerar() {
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Preencha os dados!");

    const base = nomeNumeros(nome);
    const [y, m, d] = data.split("-").map(Number);

    const pVida = piramide(base);
    pirPrincipalGlobal = pVida;
    const aVida = topo(base);
    const crono = gerarCronogramaMestre(aVida, data);
    const reg = pVida.at(-1)[0];

    // ABA PRINCIPAL
    document.getElementById("aba_principal").innerHTML = desenhar(pVida, true) + 
        `<div class="box"><h3>Regente ${reg}</h3>${textosVida[reg] || ''}</div>` +
        montarVigenciasSincronizadas(crono, aVida, textosVida);

    // DEMAIS ABAS (Sincronizadas pelo crono da Vida)
    const pPes = piramide(base.map(n => reduzir(n + reduzir(d))));
    document.getElementById("aba_pessoal").innerHTML = desenhar(pPes, true) + montarVigenciasSincronizadas(crono, topo(pPes[0]), textosPessoal);

    const pSoc = piramide(base.map(n => reduzir(n + reduzir(m))));
    document.getElementById("aba_social").innerHTML = desenhar(pSoc, true) + montarVigenciasSincronizadas(crono, topo(pSoc[0]), textosSocial);

    const pDes = piramide(base.map(n => reduzir(n + reduzir(reduzir(d) + reduzir(m)))));
    document.getElementById("aba_destino").innerHTML = desenhar(pDes, true) + montarVigenciasSincronizadas(crono, topo(pDes[0]), textosDestino);

    mostrarAba('principal');
}

function mostrarAba(nome){
    document.querySelectorAll('.aba').forEach(a=>a.style.display='none');
    document.getElementById("aba_"+nome).style.display="block";
}

// --- TRAVA DE SAÍDA NO PREMIUM ---
async function abrirPremium() {
    if(!pirPrincipalGlobal) return alert("Gere as matrizes primeiro.");

    // MARCA COMO USADO NO FIREBASE AGORA
    try {
        await fetch(`${DB_URL}vendas/${userEmail}.json`, {
            method: 'PATCH',
            body: JSON.stringify({ status: 'usado' }),
            headers: { 'Content-Type': 'application/json' }
        });
    } catch (e) { console.error(e); }

    const pacote = {
        nome: document.getElementById("nome").value,
        data: document.getElementById("data").value,
        piramidePrincipal: document.getElementById("aba_principal").innerHTML,
        piramidePessoal: document.getElementById("aba_pessoal").innerHTML,
        piramideSocial: document.getElementById("aba_social").innerHTML,
        piramideDestino: document.getElementById("aba_destino").innerHTML
    };

    localStorage.setItem("relatorioPiramide", JSON.stringify(pacote));
    window.open("matriz-premium.html", "_blank");

    // Redireciona para matar a sessão e impedir retorno
    setTimeout(() => { window.location.href = "index.html"; }, 2000);
}
</script>
</body>
</html>
