 /* Esta regra faz o HTML respeitar as quebras de linha do seu textos.js */

/* 🟥 SEQUÊNCIA NEGATIVA (Vermelho Vivo) */

/* 🟨 SEQUÊNCIA ESPECIAL (Amarelo Brilhante) */

}

/* 🟩 FLUXO FINANCEIRO (Verde) */

@media(min-width: 768px) { .abas { display: block; } .abas button { width: auto; display: inline-block; } }
@media(max-width: 768px) { .piramide.compacta { font-size: 3.2vw; } .num { padding: 4px 1.5vw; } }

<script>
// === INÍCIO DA ADAPTAÇÃO PARA VENDA (TRAVA FIREBASE) ===

const userEmail = urlParams.get('user');

verificarAcesso();
// === FIM DA ADAPTAÇÃO PARA VENDA ===

// TODO O SEU CÓDIGO ORIGINAL ABAIXO (SEM ALTERAR UMA VÍRGULA DAS FUNÇÕES)
const textos = window.textos || {
    introRegente: "O Regente é o coração da sua pirâmide...",
    introNegativas: "As Sequências Negativas revelam desafios vibracionais...",
    introEspeciais: "As Sequências Especiais representam ocorrências pontuais...",
    introFinanceiro: "A análise financeira foca na prosperidade...",
    introVigencias: "As Vigências representam os ciclos de atuação das potências..."
};
    
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0];
    let acentos = normal.slice(1);
    let valorBase = mapa[base] ?? 0;
    let somaAcentos = 0, multAcentos = 1;
    for(let a of acentos){
        if(a === "\u0301") somaAcentos += 2;
        else if(a === "\u0302") somaAcentos += 7;
        else if(a === "\u0303") somaAcentos += 3;
        else if(a === "\u0327") somaAcentos += 6;
        else if(a === "\u0300") multAcentos *= 2;
        else if(a === "\u0308") multAcentos *= 2;
    }
    return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
    while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); }
    return n;
}

function nomeNumeros(nome){
    nome=nome.toUpperCase();
    let arr=[];
    for(let l of nome){ if(l!==" "){ let v=valorLetra(l); if(v)arr.push(v); } }
    return arr;
}

function piramide(base){
    let b = [...base];
    let linhas=[b];
    while(b.length>1){
        let nova=[];
        for(let i=0;i<b.length-1;i++){ nova.push(reduzir(b[i]+b[i+1])); }
        linhas.push(nova);
        b=nova;
    }
    return linhas;
}

function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

function calcularVigenciaPorPosicao(linha, coluna, cronograma) {
    let indiceInicio = coluna;
    let indiceFim = coluna + linha; 
    let periodosAfetados = cronograma.filter(p => p.indiceArcano >= indiceInicio && p.indiceArcano <= indiceFim);
    if (periodosAfetados.length === 0) return "Fase de transição";
    let idadeIni = periodosAfetados[0].idadeIni;
    let idadeFim = periodosAfetados[periodosAfetados.length - 1].idadeFim;
    return `${idadeIni} a ${idadeFim} anos`;
}

function gerarCronogramaMestre(arcanosVida, data) {
    let cronograma = [];
    const [ano, mes, dia] = data.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, contadorCiclo = 0;
    while (idade < 100) {
        let indice = contadorCiclo % arcanosVida.length;
        let arc_ref = arcanosVida[indice];
        let anosDuracao = parseInt(arc_ref.toString()[0]);
        if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;
        let inicio = new Date(atual);
        atual.setFullYear(atual.getFullYear() + anosDuracao);
        cronograma.push({
            idadeIni: idade, idadeFim: idade + anosDuracao,
            ini: inicio.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'),
            indiceArcano: indice 
        });
        idade += anosDuracao;
        contadorCiclo++;
    }
    return cronograma;
}

function gerarRelatorioNegativasComVigencia(linhas, crono, bancoTxt) {
    const { posNeg } = detectarSequencias(linhas);
    if (!posNeg || posNeg.length === 0) return "";
    let h = `<div class="box"><h3 style="color:#d32f2f;">⚠️ Sequências Negativas</h3>`;
    let gruposContados = new Set();
    let encontrou = false;
    posNeg.forEach(p => {
        let num = linhas[p.linha][p.indice];
        let idGrupo = `neg-${num}-L${p.linha}`;
        if (!gruposContados.has(idGrupo)) {
            encontrou = true;
            gruposContados.add(idGrupo);
            let vigencia = calcularVigenciaPorPosicao(p.linha, p.indice, crono);
            h += `<div style="margin-bottom:12px; border-left:4px solid #ff6b6b; padding-left:10px; text-align:left;">
                    <b style="font-size:20px;">🚫 Sequência ${num}</b><br>
                    <small><b>Período Crítico:</b> ${vigencia}</small><br>
                    <span style="font-size:16px; color:#000;">${bancoTxt[num] || 'Desafio vibracional detectado.'}</span>
                  </div>`;
        }
    });
    return encontrou ? h + "</div>" : "";
}

function gerarRelatorioEspeciaisComVigencia(linhas, crono, bancoTxt) {
    let h = `<div class="box"><h3 style="color:#ffff00;">⭐ Impactos Especiais</h3>`;
    let gruposContados = new Set();
    let encontrou = false;
    linhas.forEach((linha, i) => {
        for (let j = 0; j < linha.length - 2; j++) {
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            if (bancoTxt && bancoTxt[seq]) {
                let idImpacto = `esp-${seq}-L${i}-C${j}`;
                if (!gruposContados.has(idImpacto)) {
                    encontrou = true;
                    gruposContados.add(idImpacto);
                    let vigencia = calcularVigenciaPorPosicao(i, j, crono);
                    h += `<div style="margin-bottom:12px; border-left:4px solid #b8860b; padding-left:10px; text-align:left;">
                            <b style="font-size:20px;">✨ Impacto ${seq}</b><br>
                            <small><b>Período Ativo:</b> ${vigencia}</small><br>
                            <span style="font-size:16px; color:#000;">${bancoTxt[seq]}</span>
                          </div>`;
                }
            }
        }
    });
    return encontrou ? h + "</div>" : "";
}

function gerarRelatorioFinanceiroComVigencia(linhas, crono, bancoTxt) {
    const posFin = detectarSequenciaFinanceira(linhas);
    if (!posFin || posFin.length === 0) return "";
    let h = `<div class="box"><h3 style="color:#2e7d32;">💰 Fluxos de Prosperidade</h3>`;
    let gruposIdentificados = new Set();
    let contadorReal = 0;
    posFin.forEach(p => {
        let idGrupo = `linha-${p.linha}-col-${p.indice}`;
        if (!gruposIdentificados.has(idGrupo)) {
            gruposIdentificados.add(`linha-${p.linha}-col-${p.indice}`);
            gruposIdentificados.add(`linha-${p.linha}-col-${p.indice + 1}`);
            gruposIdentificados.add(`linha-${p.linha + 1}-col-${p.indice}`);
            let vigencia = calcularVigenciaPorPosicao(p.linha, p.indice, crono);
            h += `<div style="margin-bottom:12px; border-left:4px solid #34c759; padding-left:10px; text-align:left;">
                    <b style="font-size:20px;">✅ Sequência Financeira 99/9</b><br>
                    <small><b>Janela:</b> ${vigencia}</small><br>
                    <span style="font-size:16px; color:#000;">${bancoTxt[999] || 'Momento de colheita material.'}</span>
                  </div>`;
            contadorReal++;
        }
    });
    return contadorReal > 0 ? h + "</div>" : "";
}

function montarConteudoComIntros(pir, reg, txtReg, cron, tMapa, titulo, bNeg, bEsp, bFin) {
    let r = `<h2 class="tituloPiramide">${titulo}</h2>`;
    // Passamos o bEsp (que contém as sequências especiais daquela aba) aqui:
    r += desenhar(pir, true, bEsp); 
    
    // Texto do Regente em cima do resultado do Regente
    r += `<div class="box"><h3>⭐ Regente</h3><p>${textos.introRegente}</p><h2>Sua Potência: ${reg}</h2>${txtReg[reg] || ''}</div>`;
    
    // Texto de Negativas em cima do bloco de Negativas
    if (detectarSequencias(pir).posNeg.length > 0) {
        r += `<div class="box"><p>${textos.introNegativas}</p></div>`;
        r += gerarRelatorioNegativasComVigencia(pir, cron, bNeg);
    }

    // Texto de Especiais em cima do bloco de Especiais
  
    r += `<div class="box"><p>${textos.introEspeciais}</p></div>`;
    r += gerarRelatorioEspeciaisComVigencia(pir, cron, bEsp);

    // Texto Financeiro em cima do bloco Financeiro
    if (detectarSequenciaFinanceira(pir).length > 0) {
        r += `<div class="box"><p>${textos.introFinanceiro}</p></div>`;
        r += gerarRelatorioFinanceiroComVigencia(pir, cron, bFin);
    }

    // Texto de Vigências em cima do Fluxo
    r += `<div class="box"><p>${textos.introVigencias}</p></div>`;
    r += montarVigenciasSincronizadas(cron, topo(pir[0]), tMapa);
    
    return r;
} 

function montarVigenciasSincronizadas(cronograma, arcanosDaPiramide, textosMapa) {
    let html = "<div class='box'><h3>⏳ Fluxo das Potências Quânticas</h3>";
    
    cronograma.forEach((periodo) => {
        let indiceTopo = periodo.indiceArcano % arcanosDaPiramide.length;
        let numArcano = arcanosDaPiramide[indiceTopo];
        
        // Aqui acrescentamos o período de data (ini e fim) ao lado da idade
        html += `<div class="box" style="text-align:left; border-left: 5px solid #111827;">
                 <h2 style="margin:0; color:#111827;">🔹 Potência ${numArcano}</h2>
                 <p style="margin: 5px 0; font-weight: bold; color: #374151; font-size: 20px;">
                    📅 Período: de ${periodo.ini} até ${periodo.fim} 
                    <span style="color: #111; font-weight: normal;">(de ${periodo.idadeIni} até seus ${periodo.idadeFim} anos de idade)</span>
                 </p>
                 <p style="font-size:16px; margin-top:5px;">${textosMapa[numArcano] || "<i>Interpretação em análise.</i>"}</p>
                 </div>`;
    });
    
    return html + "</div>";
}

function detectarSequencias(linhas){
    let posNeg=[]; let sequencias=[];
    linhas.forEach((linha, i)=>{
        let cont=1;
        for(let j=1;j<linha.length;j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont>=3){
                    sequencias.push({numero: linha[j-1], repeticoes: cont});
                    for(let k=j-cont;k<j;k++) posNeg.push({linha:i,indice:k});
                }
                cont=1;
            }
        }
        if(cont>=3){
            sequencias.push({numero: linha[linha.length-1], repeticoes: cont});
            for(let k=linha.length-cont;k<linha.length;k++) posNeg.push({linha:i,indice:k});
        }
    });
    return {sequencias, posNeg};
}

function detectarPosicoesEspeciais(linhas, bancoEsp){
    let pos=[];
    // Se não vier um banco específico, tenta pegar o global
    const esp = bancoEsp || window.sequenciasEspeciais || {};
    
    linhas.forEach((linha, i) => {
        for(let j=0; j < linha.length - 2; j++){
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            if(esp[seq]){ 
                pos.push({linha:i, indice:j}, {linha:i, indice:j+1}, {linha:i, indice:j+2}); 
            }
        }
    });
    return pos;
}

function detectarSequenciaFinanceira(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9){
                pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i+1, indice:j});
            }
        }
    }
    return pos;
}

function desenhar(linhas, compacta = false, bancoEsp = null) {
    let classe = compacta ? "piramide compacta" : "piramide";
    
    // Busca as posições de cada tipo de destaque
    const neg = (typeof detectarSequencias === 'function') ? detectarSequencias(linhas).posNeg : [];
    const esp = (typeof detectarPosicoesEspeciais === 'function') ? detectarPosicoesEspeciais(linhas, bancoEsp) : [];
    const fin = (typeof detectarSequenciaFinanceira === 'function') ? detectarSequenciaFinanceira(linhas) : [];

    let html = `<div class="${classe}">`; // Variável criada como 'html'

    linhas.forEach((linha, i) => {
        html += `<div class="linha">`;
        linha.forEach((n, j) => {
            let classes = ["num"];

            // Verifica se a posição deve ser colorida
            if (neg.some(p => p.linha === i && p.indice === j)) classes.push("negativo");
            if (fin.some(p => p.linha === i && p.indice === j)) classes.push("financeiro");
            if (esp.some(p => p.linha === i && p.indice === j)) classes.push("especial");

            html += `<div class="${classes.join(' ')}">${n}</div>`;
        });
        html += `</div>`;
    });

    html += `</div>`;
    return html; // Retorno corrigido para 'html' (sem o número 1)
}

function piramidePessoal(baseNome, dia) { return piramide(baseNome.map(n => reduzir(n + reduzir(dia)))); }
function piramideSocial(baseNome, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(mes)))); }
function piramideDestino(baseNome, dia, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(reduzir(dia) + reduzir(mes))))); }

function mostrarAba(nome){
    document.querySelectorAll('.aba').forEach(a=>a.style.display='none');
    document.getElementById("aba_"+nome).style.display="block";
}

function gerar() {
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Preencha os dados!");

    const base = nomeNumeros(nome);
    const [y, m, d] = data.split("-").map(Number);
    const pVida = piramide(base);
    const aVida = topo(base);
    const crono = gerarCronogramaMestre(aVida, data);
    
    // Agora o montarConteudo já coloca as intros nos lugares certos individualmente
    const htmlVida = explicacoes.principal + montarConteudoComIntros(pVida, pVida.at(-1)[0], textosVida, crono, textosVida, "Matriz da Vida", textosSeqNegVida, textosSeqEspVida, textosFinVida);
    const htmlPessoal = explicacoes.pessoal + montarConteudoComIntros(piramidePessoal(base, d), piramidePessoal(base, d).at(-1)[0], textosPessoal, crono, textosPessoal, "Matriz Pessoal", textosSeqNegPessoal, textosSeqEspPessoal, textosFinPessoal);
    const htmlSocial = explicacoes.social + montarConteudoComIntros(piramideSocial(base, m), piramideSocial(base, m).at(-1)[0], textosSocial, crono, textosSocial, "Matriz Social", textosSeqNegSocial, textosSeqEspSocial, textosFinSocial);
    const htmlDestino = explicacoes.destino +  montarConteudoComIntros(piramideDestino(base, d, m), piramideDestino(base, d, m).at(-1)[0], textosDestino, crono, textosDestino, "Matriz de Destino", textosSeqNegDestino, textosSeqEspDestino, textosFinDestino);

    document.getElementById("aba_principal").innerHTML = htmlVida;
    document.getElementById("aba_pessoal").innerHTML = htmlPessoal;
    document.getElementById("aba_social").innerHTML = htmlSocial;
    document.getElementById("aba_destino").innerHTML = htmlDestino;

    localStorage.setItem("relatorioPiramide", JSON.stringify({
        nome, data: data.split("-").reverse().join("/"),
        abaPrincipal: htmlVida, abaPessoal: htmlPessoal, abaSocial: htmlSocial, abaDestino: htmlDestino
    }));
    mostrarAba('principal');
}

</script>
