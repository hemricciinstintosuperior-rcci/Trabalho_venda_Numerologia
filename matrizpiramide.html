/* --- ESTILO DA PIRÂMIDE --- */
.piramide.compacta { font-size: 10px; line-height: 0.80; padding: 5px 0; display: inline-block; }
.linha { display:flex; justify-content:center; gap: 2px; margin: 1px; }
 /* Esta regra faz o HTML respeitar as quebras de linha do seu textos.js */
.box p, .box span {
    white-space: pre-wrap; /* Mantém as quebras de linha e o espaçamento original */

/* Garante que a pirâmide continue centralizada mesmo com textos à esquerda */

    display: flex;

    align-items: center;
    justify-content: center;
    margin: 20px auto;

/* Cor Padrão (Ciano) */

.linha { 
    display: flex; 
    justify-content: center; 
    gap: 4px; 
    margin: 2px 0; 
    width: 100%; /* Garante que a linha ocupe a largura toda para centralizar */
}

.num { 
    /* O segredo está aqui: largura e altura IGUAIS e fixas */
    width: 15px; 
    height: 15px; 
    min-width: 15px; /* Impede de esmagar no mobile */
    
    display: flex;
    align-items: center;
    justify-content: center;
    
    background: #28d3ee; 
    color: #000; 
    font-size: 12px; 
    font-weight: bold; 
    border-radius: 4px;

/* 🟥 SEQUÊNCIA NEGATIVA (Vermelho Vivo) */

    background-color: #FF0000 !important; 
    color: #ffffff !important;

// 1. Função que limpa e personaliza qualquer texto que venha do banco
function personalizarTexto(texto) {
    if (!texto) return "";
    const nomeCompleto = document.getElementById("nome").value.trim();
    const primeiroNome = nomeCompleto.split(" ")[0] || "você";
    
    let processado = texto.replace(/você/g, `<strong>${primeiroNome}</strong>`);
    
    // Divide o texto por quebras de linha e cria parágrafos reais
    return processado.split('\n').map(paragrafo => {
        if(paragrafo.trim().length > 0) {
            return `<p style="text-align: left;">${paragrafo}</p>`;
        }
        return "";
    }).join("");
}
 
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0];
    let acentos = normal.slice(1);
    let valorBase = mapa[base] ?? 0;
    let somaAcentos = 0, multAcentos = 1;
    for(let a of acentos){
        if(a === "\u0301") somaAcentos += 2;
        else if(a === "\u0302") somaAcentos += 7;
        else if(a === "\u0303") somaAcentos += 3;
        else if(a === "\u0327") somaAcentos += 6;
        else if(a === "\u0300") multAcentos *= 2;
        else if(a === "\u0308") multAcentos *= 2;
    }
    return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
    while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); }
    return n;
}

function nomeNumeros(nome){
    nome=nome.toUpperCase();
    let arr=[];
    for(let l of nome){ if(l!==" "){ let v=valorLetra(l); if(v)arr.push(v); } }
    return arr;
}

function piramide(base){
    let b = [...base];
    let linhas=[b];
    while(b.length>1){
        let nova=[];
        for(let i=0;i<b.length-1;i++){ nova.push(reduzir(b[i]+b[i+1])); }
        linhas.push(nova);
        b=nova;
    }
    return linhas;
}

function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

// --- FUNÇÃO DE APOIO: CÁLCULO LINEAR VERTICAL ---
function calcularVigenciaLinearVertical(coluna, tamanhoSeq, cronograma, arcanosTopo) {
    let detalhes = [];
    // Cada número da sequência pega a potência da sua própria coluna no topo
    for (let i = 0; i < tamanhoSeq; i++) {
        let indiceColuna = coluna + i;
        let arcRef = arcanosTopo[indiceColuna]; 
        let periodo = cronograma.find(p => p.indiceArcano === indiceColuna);
        
        if (periodo) {
            detalhes.push({
                potencia: arcRef,
                duracao: parseInt(arcRef.toString()[0]) || 1,
                idadeIni: periodo.idadeIni,
                idadeFim: periodo.idadeFim
            });
        }
    }
    return detalhes;
}

function gerarCronogramaMestre(arcanosVida, data) {
    let cronograma = [];
    const [ano, mes, dia] = data.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, contadorCiclo = 0;
    while (idade < 100) {
        let indice = contadorCiclo % arcanosVida.length;
        let arc_ref = arcanosVida[indice];
        let anosDuracao = parseInt(arc_ref.toString()[0]);
        if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;
        let inicio = new Date(atual);
        atual.setFullYear(atual.getFullYear() + anosDuracao);
        cronograma.push({
            idadeIni: idade, idadeFim: idade + anosDuracao,
            ini: inicio.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'),
            indiceArcano: indice 
        });
        idade += anosDuracao;
        contadorCiclo++;
    }
    return cronograma;
}

function calcularPeriodoSequencia(periodoBase, duracaoTotal) {

    let [dia, mes, ano] = periodoBase.ini.split("/").map(Number);

    let dataIni = new Date(ano, mes - 1, dia);
    let dataFim = new Date(dataIni);

    dataFim.setFullYear(dataFim.getFullYear() + duracaoTotal);

    return {
        ini: dataIni.toLocaleDateString('pt-BR'),
        fim: dataFim.toLocaleDateString('pt-BR')
    };
}
 
// --- NEGATIVAS ---
// --- SEQUÊNCIAS NEGATIVAS (Agora lê o topo) ---
function gerarRelatorioNegativasComVigencia(linhas, crono, bancoTxt, topoVida) {
    let h = `<div class="blocoRelatorio"><h2 style="color:#d32f2f;"> Vulnerabilidade e Insegurança  ⚠️</h2>`;
    let encontrou = false;
    
    linhas.forEach((linha, i) => {
        // REMOVIDO: if (i === 0) return; -> Agora ele lê a linha 0 (o topo)
        let j = 0;
        while (j < linha.length) {
            let num = linha[j];
            let cont = 1;
            while (j + cont < linha.length && linha[j + cont] === num) { cont++; }
            
            if (cont >= 3) {
                encontrou = true;
                let duracaoTotal = 0;
                let offset = Math.floor(i / 2);
                
                for (let k = 0; k < cont; k++) {
                    let colReal = j + offset + k;
                    if (colReal < topoVida.length) {
                        duracaoTotal += parseInt(topoVida[colReal].toString()[0]) || 0;
                    }
                }
                
                let periodo = crono[j + offset] || crono[0];
                let idadeIni = periodo.idadeIni;
                let idadeFim = idadeIni + duracaoTotal;
               let datas = calcularPeriodoSequencia(periodo, duracaoTotal);
let dataIni = datas.ini;
let dataFim = datas.fim;
             
                h += `<div class="blocoRelatorio" style="border-left:5px solid #ff0000; padding-left:10px; margin-bottom:20px;">
                        <b style="font-size:18px;">🚫 Sequência ${num}</b><br>
                         <span style="color:#111827;">📅 Data: de ${dataIni} até ${dataFim}</span><br>
                        <span style="font-weight:bold; color:#d32f2f;">Periodo mais crítico: ${duracaoTotal} anos (dos ${idadeIni} aos ${idadeFim} anos)</span>
                        <p>${personalizarTexto(bancoTxt[num])}</p>
                      </div>`;
                j += cont;
            } else { j++; }
        }
    });
    return encontrou ? h + "</div>" : "";
}

// --- SEQUÊNCIAS ESPECIAIS (Agora lê o topo) ---
function gerarRelatorioEspeciaisComVigencia(linhas, crono, bancoTxt, topoVida) {

                    if (colReal < topoVida.length) {
                        duracaoTotal += parseInt(topoVida[colReal].toString()[0]) || 0;
                    }
                }
                
                let periodo = crono[j + offset] || crono[0];
                let idadeIni = periodo.idadeIni;
                let idadeFim = idadeIni + duracaoTotal;
                  let datas = calcularPeriodoSequencia(periodo, duracaoTotal);
let dataIni = datas.ini;
let dataFim = datas.fim;
             
                h += `<div class="blocoRelatorio" style="border-left:5px solid #b8860b; padding-left:10px; margin-bottom:20px;">
                        <b style="font-size:18px;">✨ Impacto ${seq}</b><br>
                        <span style="color:#111827;">📅 Data: de ${dataIni} até ${dataFim}</span><br>
                        <span style="font-weight:bold; color:#b8860b;">Periodo mais crítico: ${duracaoTotal} anos (dos ${idadeIni} aos ${idadeFim} anos)</span>
                        <p>${personalizarTexto(bancoTxt[seq])}</p>
                      </div>`;
            }
        }
    });
    return encontrou ? h + "</div>" : "";
}

// --- FLUXO FINANCEIRO (Agora lê o topo) ---
function gerarRelatorioFinanceiroComVigencia(linhas, crono, bancoTxt, topoVida) {
    let h = `<div class="blocoRelatorio"><h2 style="color:#2e7d32;"> Fluxo Financeiro  💰</h2>`;
    let encontrou = false;
    
    linhas.forEach((linha, i) => {
        // REMOVIDO: if (i === 0) return; -> O topo pode ter sequências 99
        for (let j = 0; j < linha.length - 1; j++) {

                encontrou = true;
                let duracaoTotal = 0;
                let offset = Math.floor(i / 2);
                
                for (let k = 0; k < 2; k++) {
                    let colReal = j + offset + k;
                    if (colReal < topoVida.length) {
                        duracaoTotal += parseInt(topoVida[colReal].toString()[0]) || 0;

                }
                
                let periodo = crono[j + offset] || crono[0];
                let idadeIni = periodo.idadeIni;
                let idadeFim = idadeIni + duracaoTotal;
                 let datas = calcularPeriodoSequencia(periodo, duracaoTotal);
let dataIni = datas.ini;
let dataFim = datas.fim;
             
                h += `<div class="blocoRelatorio" style="border-left:5px solid #2e7d32; padding-center:10px; margin-bottom:20px;">

                        <span style="font-weight:bold;text-align:center; color:#2e7d32;">Vigência: ${duracaoTotal} anos (dos ${idadeIni} aos ${idadeFim} anos)</span>

            }

// 2. Nova versão da montarConteudoComIntros (Ajustada para processar os textos)
function montarConteudoComIntros(linhas, regente, txtReg, crono, txtVig, nomePiramide, txtNeg, txtEsp, txtFin, topoVida) {
    let html = `<div class="box"><h2>${nomePiramide}</h2>` + desenhar(linhas, true, txtEsp) + `</div>`;
    let tipo = nomePiramide.toLowerCase().includes("vida") ? "vida" : (nomePiramide.toLowerCase().includes("pessoal") ? "pessoal" : (nomePiramide.toLowerCase().includes("social") ? "social" : "destino"));
    const intro = window.introsPiramides ? window.introsPiramides[tipo] : {};

    if(intro.regente) html += `<div>${personalizarTexto(intro.regente)}</div>`;
    if(txtReg && txtReg[regente]) html += `<div class="blocoRelatorio">${personalizarTexto(txtReg[regente])}</div>`;

    const relNeg = gerarRelatorioNegativasComVigencia(linhas, crono, txtNeg, topoVida);
    if(relNeg) {
        if(intro.negativas) html += `<div>${personalizarTexto(intro.negativas)}</div>`;
        html += relNeg;
    }

    const relEsp = gerarRelatorioEspeciaisComVigencia(linhas, crono, txtEsp, topoVida);
    if(relEsp) {
        if(intro.especiais) html += `<div>${personalizarTexto(intro.especiais)}</div>`;
        html += relEsp;
    }

    const relFin = gerarRelatorioFinanceiroComVigencia(linhas, crono, txtFin, topoVida);
    if(relFin) {
        if(intro.financeiro) html += `<div>${personalizarTexto(intro.financeiro)}</div>`;
        html += relFin;
    }

    if(crono) {
        if(intro.vigencias) html += `<div>${personalizarTexto(intro.vigencias)}</div>`;
        html += montarVigenciasSincronizadas(crono, topo(linhas[0]), txtVig);
    }
    return html;
}

// 3. Nova versão da montarVigenciasSincronizadas
function montarVigenciasSincronizadas(cronograma, arcanosDaPiramide, textosMapa) {
    let html = "<div class='blocoRelatorio'><h2>⏳ Fluxo das Potências ⏳</h2>";
    
    cronograma.forEach((periodo) => {
        // Pega o arcano correspondente ao índice, ou o último se passar do tamanho
        let idx = periodo.indiceArcano;
        let numArcano = arcanosDaPiramide[idx] || arcanosDaPiramide[arcanosDaPiramide.length - 1];
        
        let textoFinal = personalizarTexto(textosMapa[numArcano] || `Interpretação da Potência ${numArcano} em análise.`);

         html += `<div class="blocoRelatorio" style="text-align:center; border-left: 5px solid #ffffff;">
                 <h2 style="margin:0; color:#111827;">✡︎ Potência ${numArcano}</h2>
                 <span style="margin:0; color:#111827;"> 📅 Período: de ${periodo.ini} até ${periodo.fim} </span><br>
                 <span style="color: #111827; font-weight: normal;">🔍 de ${periodo.idadeIni} a ${periodo.idadeFim} anos de idade</span>
                 <div style="font-size:18px; margin-top:15px; text-align:left; color:#333;">
                    ${textoFinal}
                 </div>
                 </div>`;
    });
    
    return html + "</div>";
}

function detectarSequencias(linhas){
    let posNeg=[]; let sequencias=[];
    linhas.forEach((linha, i)=>{
        let cont=1;
        for(let j=1;j<linha.length;j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont>=3){
                    sequencias.push({numero: linha[j-1], repeticoes: cont});
                    for(let k=j-cont;k<j;k++) posNeg.push({linha:i,indice:k});
                }
                cont=1;
            }
        }
        if(cont>=3){
            sequencias.push({numero: linha[linha.length-1], repeticoes: cont});
            for(let k=linha.length-cont;k<linha.length;k++) posNeg.push({linha:i,indice:k});
        }
    });
    return {sequencias, posNeg};
}

function detectarPosicoesEspeciais(linhas, bancoEsp){
    let pos=[];
    // Se não vier um banco específico, tenta pegar o global
    const esp = bancoEsp || window.sequenciasEspeciais || {};
    
    linhas.forEach((linha, i) => {
        for(let j=0; j < linha.length - 2; j++){
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            if(esp[seq]){ 
                pos.push({linha:i, indice:j}, {linha:i, indice:j+1}, {linha:i, indice:j+2}); 
            }
        }
    });
    return pos;
}

function detectarSequenciaFinanceira(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9){
                pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i+1, indice:j});
            }
        }
    }
    return pos;
}

function desenhar(linhas, compacta = false, bancoEsp = null) {
    let classe = compacta ? "piramide compacta" : "piramide";
    
    // Busca as posições de cada tipo de destaque
    const neg = (typeof detectarSequencias === 'function') ? detectarSequencias(linhas).posNeg : [];
    const esp = (typeof detectarPosicoesEspeciais === 'function') ? detectarPosicoesEspeciais(linhas, bancoEsp) : [];
    const fin = (typeof detectarSequenciaFinanceira === 'function') ? detectarSequenciaFinanceira(linhas) : [];

    let html = `<div class="${classe}">`; // Variável criada como 'html'

    linhas.forEach((linha, i) => {
        html += `<div class="linha">`;
        linha.forEach((n, j) => {
            let classes = ["num"];

            // Verifica se a posição deve ser colorida
            if (neg.some(p => p.linha === i && p.indice === j)) classes.push("negativo");
            if (fin.some(p => p.linha === i && p.indice === j)) classes.push("financeiro");
            if (esp.some(p => p.linha === i && p.indice === j)) classes.push("especial");

            html += `<div class="${classes.join(' ')}">${n}</div>`;
        });
        html += `</div>`;
    });

    html += `</div>`;
    return html; // Retorno corrigido para 'html' (sem o número 1)
}

function piramidePessoal(baseNome, dia) { return piramide(baseNome.map(n => reduzir(n + reduzir(dia)))); }
function piramideSocial(baseNome, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(mes)))); }
function piramideDestino(baseNome, dia, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(reduzir(dia) + reduzir(mes))))); }

function gerar() {
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Preencha os dados!");

    const base = nomeNumeros(nome);
    const [y, m, d] = data.split("-").map(Number);
    
    // 1. GERA A PIRÂMIDE DA VIDA PRIMEIRO PARA PEGAR O TOPO MESTRE
    const pVida = piramide(base);
    const topoVidaMestre = topo(pVida[0]); 

    // 2. GERA AS OUTRAS PIRÂMIDES (ELAS MANTÊM SEUS NÚMEROS PRÓPRIOS)
    const pPes = piramidePessoal(base, d);
    const pSoc = piramideSocial(base, m);
    const pDes = piramideDestino(base, d, m);

    // 3. CRONOGRAMA ÚNICO BASEADO NO TOPO DA VIDA
    const cronoMestre = gerarCronogramaMestre(topoVidaMestre, data);
    
    const potVida = pVida.at(-1)[0];
    const potPessoal = pPes.at(-1)[0];
    const potSocial = pSoc.at(-1)[0];
    const potDestino = pDes.at(-1)[0];

    const htmlSintese = gerarSinteseFinal(potVida, potPessoal, potSocial, potDestino, window.textosSintese || {});

    // 4. MONTAGEM: TODAS AS MATRIZES USAM 'cronoMestre' E 'topoVidaMestre'
    const htmlVida = (explicacoes.principal || "") + montarConteudoComIntros(pVida, potVida, textosVida, cronoMestre, textosVida, "Matriz da Vida", textosSeqNegVida, textosSeqEspVida, textosFinVida, topoVidaMestre);
    const htmlPessoal = (explicacoes.pessoal || "") + montarConteudoComIntros(pPes, potPessoal, textosPessoal, cronoMestre, textosPessoal, "Matriz Pessoal", textosSeqNegPessoal, textosSeqEspPessoal, textosFinPessoal, topoVidaMestre);
    const htmlSocial = (explicacoes.social || "") + montarConteudoComIntros(pSoc, potSocial, textosSocial, cronoMestre, textosSocial, "Matriz Social", textosSeqNegSocial, textosSeqEspSocial, textosFinSocial, topoVidaMestre);
    const htmlDestino = (explicacoes.destino || "") + montarConteudoComIntros(pDes, potDestino, textosDestino, cronoMestre, textosDestino, "Matriz de Destino", textosSeqNegDestino, textosSeqEspDestino, textosFinDestino, topoVidaMestre);

    document.getElementById("aba_principal").innerHTML = htmlSintese + htmlVida;
    document.getElementById("aba_pessoal").innerHTML = htmlPessoal;
    document.getElementById("aba_social").innerHTML = htmlSocial;
    document.getElementById("aba_destino").innerHTML = htmlDestino;

    localStorage.setItem("relatorioPiramide", JSON.stringify({
        nome, data: data.split("-").reverse().join("/"),
        abaPrincipal: htmlSintese + htmlVida, abaPessoal: htmlPessoal, abaSocial: htmlSocial, abaDestino: htmlDestino
    }));
    
    mostrarAba('principal');
}
