<!DOCTYPE html>
<html lang="pt-br">
<head>
       <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   

    <title>Portal Numerológico Premium</title>
 <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Portal Num">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #0a0e1a; --card: #161b22; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: var(--gold); margin-top: 40px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Área de Login */
        .login-box { max-width: 450px; margin: 30px auto; padding: 25px; background: var(--card); border: 2px solid var(--gold); border-radius: 15px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .login-box input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }
        .login-box input:focus { border-color: var(--gold); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; max-width: 1100px; margin: 40px auto; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 15px; padding: 30px; transition: 0.4s; display: flex; flex-direction: column; align-items: center; opacity: 0.6; }
        .card.active { opacity: 1; border-color: var(--gold); }
        .icon { font-size: 50px; color: var(--gold); margin-bottom: 15px; }
        h3 { margin: 10px 0; font-size: 1.2rem; }
        p { font-size: 0.9rem; opacity: 0.8; min-height: 40px; }
        .btn-acessar { display: block; width: 100%; padding: 12px 0; margin-top: 20px; text-decoration: none; font-weight: bold; border-radius: 8px; transition: 0.3s; text-transform: uppercase; font-size: 0.85rem; background: var(--gold); color: black; border: none; cursor: pointer; }
        .btn-acessar:disabled { background: #555; cursor: not-allowed; animation: none; }
        .status { font-size: 11px; margin-top: 12px; letter-spacing: 1px; font-weight: bold; }
        .locked { color: #8b949e; }
        .unlocked { color: var(--gold); }
    </style>
</head>
<body>

    <h1><i class="fas fa-gem"></i> Portal Numerológico</h1>
    
    <div class="login-box" id="area-login">
        <h3 style="color: var(--gold); margin-bottom: 15px;">Liberar Meu Acesso</h3>
        <p>Insira os dados recebidos após a compra:</p>
        <input type="email" id="email-cliente" placeholder="E-mail da compra">
        <input type="text" id="codigo-acesso" placeholder="Código de acesso">
        <button onclick="validarAcesso()" id="btn-entrar" class="btn-acessar">Verificar Credenciais</button>
    </div>

    <div class="grid">
        <div class="card" id="card-estudo">
            <i class="fas fa-fingerprint icon"></i>
            <h3>Estudo Numerológico</h3>
            <div id="st-estudo" class="status locked">🔒 BLOQUEADO</div>
            <div id="container-estudo">
                <button class="btn-acessar" disabled>Aguardando Login</button>
            </div>
        </div>

        <div class="card" id="card-matriz">
            <i class="fas fa-layer-group icon"></i>
            <h3>Matriz da Vida</h3>
            <div id="st-matriz" class="status locked">🔒 BLOQUEADO</div>
            <div id="container-matriz">
                <button class="btn-acessar" disabled>Aguardando Login</button>
            </div>
        </div>

        <div class="card" id="card-plano">
            <i class="fas fa-bullseye icon"></i>
            <h3>Plano de Expressão Quântico</h3>
            <div id="st-plano" class="status locked">🔒 BLOQUEADO</div>
            <div id="container-plano">
                <button class="btn-acessar" disabled>Aguardando Login</button>
            </div>
        </div>

        <div class="card" id="card-harmonia">
            <i class="fas fa-heart icon"></i>
            <h3>Harmonia Conjugal</h3>
            <div id="st-harmonia" class="status locked">🔒 BLOQUEADO</div>
            <div id="container-harmonia">
                <button class="btn-acessar" disabled>Aguardando Login</button>
            </div>
        </div>
    </div>

<script>
    const DB_URL = "https://vendas-numerologia-default-rtdb.firebaseio.com/";

    const config = {
        estudo: { container: 'container-estudo', st: 'st-estudo', card: 'card-estudo', link: 'estudonumerologico' },
        matriz: { container: 'container-matriz', st: 'st-matriz', card: 'card-matriz', link: 'matrizpiramide' },
        plano: { container: 'container-plano', st: 'st-plano', card: 'card-plano', link: 'plano_de_expressao' },
        harmonia: { container: 'container-harmonia', st: 'st-harmonia', card: 'card-harmonia', link: 'harmoniaconjugal' }
    };

    async function validarAcesso() {
        const emailOriginal = document.getElementById('email-cliente').value.trim().toLowerCase();
        const codigo = document.getElementById('codigo-acesso').value.trim();
        const btn = document.getElementById('btn-entrar');

        if(!emailOriginal || !codigo) return alert("Por favor, preencha o e-mail e o código!");

        const emailChave = emailOriginal.replace(/\./g, '_');
        btn.innerText = "VERIFICANDO...";
        btn.disabled = true;

        try {
            const res = await fetch(`${DB_URL}vendas/${emailChave}.json`);
            const dados = await res.json();

            if (dados && dados.codigo === codigo) {
                if (dados.status === "usado") {
                    alert("Atenção: Este acesso já foi utilizado e expirou.");
                } else {
                    // --- NOVA LÓGICA: REGISTRA INÍCIO DO ACESSO SE NÃO EXISTIR ---
                    if (!dados.data_inicio) {
                        const agora = new Date().toISOString();
                        await fetch(`${DB_URL}vendas/${emailChave}.json`, {
                            method: 'PATCH',
                            body: JSON.stringify({ data_inicio: agora })
                        });
                    }
                    // ----------------------------------------------------------

                    liberarProduto(dados.produto, emailChave);
                    document.getElementById('area-login').style.display = 'none';
                }
            } else {
                alert("Dados incorretos ou venda ainda processando.");
            }
        } catch (e) {
            alert("Erro de conexão.");
        } finally {
            btn.innerText = "Verificar Credenciais";
            btn.disabled = false;
        }
    }

    function liberarProduto(produtoID, emailChave) {
        const app = config[produtoID];
        if (app) {
            const container = document.getElementById(app.container);
            const status = document.getElementById(app.st);
            const card = document.getElementById(app.card);

            card.classList.add('active');
            status.innerText = "✅ ACESSO LIBERADO";
            status.className = "status unlocked";

            // O link agora leva o e-mail para o gerador fazer o cálculo do cronômetro lá dentro
            container.innerHTML = `<a href="${app.link}/index.html?user=${emailChave}" class="btn-acessar">ABRIR GERADOR AGORA</a>`;
        }
    }
</script>
</body>
</html>
