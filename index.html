<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Numerológico Premium</title>
    <style>
        body { background: #0a0e1a; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 50px; }
        .card { 
            background: #161b22; border: 1px solid gold; padding: 20px; 
            border-radius: 15px; width: 250px; transition: 0.3s;
        }
        .card:hover { transform: scale(1.05); }
        .btn { 
            display: inline-block; padding: 10px 20px; margin-top: 15px;
            text-decoration: none; font-weight: bold; border-radius: 5px;
            cursor: pointer;
        }
        .btn-comprar { background: #238636; color: white; }
        .btn-acessar { background: gold; color: black; }
        .lock-icon { font-size: 0.8em; opacity: 0.6; }
    </style>
</head>
<body>

    <h1>💎 Seu Portal Numerológico Premium</h1>
    <p>Escolha o mapa que deseja gerar agora:</p>

    <div class="grid">
        <div class="card" id="card-estudo">
            <h3>Estudo Numerológico</h3>
            <div id="status-estudo" class="lock-icon">🔒 Conteúdo Bloqueado</div>
            <a href="LINK_MERCADO_PAGO_1" id="btn-estudo" class="btn btn-comprar">COMPRAR AGORA</a>
        </div>

        <div class="card" id="card-matriz">
            <h3>Matriz Quântica</h3>
            <div id="status-matriz" class="lock-icon">🔒 Conteúdo Bloqueado</div>
            <a href="LINK_MERCADO_PAGO_2" id="btn-matriz" class="btn btn-comprar">COMPRAR AGORA</a>
        </div>

        </div>

    <script>
        // --- LÓGICA DE LIBERAÇÃO ---
        // Se o Mercado Pago retornar com ?pago=estudo
        const urlParams = new URLSearchParams(window.location.search);
        const produtoPago = urlParams.get('pago');

        if (produtoPago) {
            localStorage.setItem(`liberado_${produtoPago}`, "true");
            // Limpa a URL para segurança
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        // Função que checa o que está liberado e muda os botões
        function verificarAcessos() {
            const apps = ['estudo', 'matriz', 'expressao', 'harmonia'];
            const paginas = {
                estudo: "estudonumerologico.html", // nome do seu arquivo real
                matriz: "matrizquantica.html"
            };

            apps.forEach(app => {
                if (localStorage.getItem(`liberado_${app}`)) {
                    const btn = document.getElementById(`btn-${app}`);
                    const status = document.getElementById(`status-${app}`);
                    
                    if (btn) {
                        btn.innerText = "GERAR MEU MAPA";
                        btn.className = "btn btn-acessar";
                        btn.href = paginas[app];
                        status.innerText = "✅ Acesso Liberado";
                        status.style.color = "gold";
                    }
                }
            });
        }

        verificarAcessos();
    </script>
</body>
</html>
